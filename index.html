/* ── Base ─────────────────────────────────────────────── */
*{box-sizing:border-box;}
body{background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Arabic',sans-serif;margin:0;color:#0f172a;transition:background .3s;}
[dir="rtl"] .sidebar{left:auto;right:0;}
[dir="rtl"] .main{margin-left:0;margin-right:248px;}
[dir="rtl"] th,[dir="rtl"] td{text-align:right;}
[dir="rtl"] .ph{flex-direction:row-reverse;}
[dir="rtl"] .ph-left{flex-direction:row-reverse;}
[dir="rtl"] .filter-bar{flex-direction:row-reverse;}
[dir="rtl"] .filter-bar .fb-field{align-items:flex-end;}
[dir="rtl"] select{text-align:right;}
/* ── Sidebar ──────────────────────────────────────────── */
.sidebar{width:248px;height:100vh;background:linear-gradient(180deg,#0f172a 0%,#1a2742 60%,#1e293b 100%);position:fixed;top:0;left:0;z-index:40;overflow:hidden;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.18);}
.main{margin-left:248px;min-height:100vh;}
/* ── Badges ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:700;text-transform:capitalize;letter-spacing:.02em;}
/* ── Modal ────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease;}
.modal{background:#fff;border-radius:22px;width:100%;max-width:600px;margin:12px;box-shadow:0 32px 80px rgba(0,0,0,.28);max-height:92vh;overflow-y:auto;animation:slideUp .22s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Forms ────────────────────────────────────────────── */
input,select,textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;outline:none;background:#fff;transition:border .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
input:hover:not(:focus),select:hover:not(:focus){border-color:#cbd5e1;}
/* ── Buttons ──────────────────────────────────────────── */
.btn{border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn:active{transform:translateY(0);box-shadow:none;}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.btn-gray{background:#fff;color:#374151;border:1.5px solid #e2e8f0;}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.25);}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.25);}
.btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,.25);}
/* ── Tables ───────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid #f1f5f9;}
td{padding:11px 14px;font-size:13px;color:#334155;border-bottom:1px solid #f8fafc;vertical-align:middle;}
tr:hover td{background:#f8fafc;transition:background .1s;}
/* ── Cards ────────────────────────────────────────────── */
.card{background:#fff;border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #f1f5f9;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);}
.scard{background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #f1f5f9;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.scard:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);}
/* ── Misc UI ──────────────────────────────────────────── */
.upload-zone{border:2px dashed #cbd5e1;border-radius:14px;padding:24px;text-align:center;cursor:pointer;background:#fafbfd;transition:all .2s;}
.upload-zone:hover{border-color:#3b82f6;background:#eff6ff;transform:scale(1.01);}
.tab-btn{padding:8px 18px;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .15s;}
.tab-btn:hover{background:#f1f5f9;color:#334155;}
.tab-btn.active{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.lbl{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:4px;letter-spacing:.01em;}
.shdr{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.ibox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;}
.wbox{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px;}
.rbox{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px;}
.gbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;}
.empty{text-align:center;padding:52px 20px;color:#94a3b8;}
.empty .ei{font-size:52px;margin-bottom:12px;opacity:.25;display:block;}
/* ── Scrollbar ────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
/* ── Filter bar ───────────────────────────────────────── */
.filter-bar{background:#fff;border-radius:14px;padding:12px 16px;border:1px solid #f1f5f9;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.filter-bar .fb-field{display:flex;flex-direction:column;min-width:140px;}
.filter-bar .fb-field label{font-size:11px;font-weight:700;color:#64748b;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.filter-bar input,.filter-bar select{font-size:12px;padding:6px 10px;border-radius:8px;}
.filter-reset{font-size:11px;font-weight:700;color:#ef4444;background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:8px;align-self:flex-end;white-space:nowrap;transition:background .15s;}
.filter-reset:hover{background:#fef2f2;}
/* ── Page header ──────────────────────────────────────── */
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.ph-left{display:flex;align-items:center;gap:12px;}
.ph-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.sum-card{border-radius:16px;padding:16px 18px;position:relative;overflow:hidden;}
/* ── Stat grid ────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px;}
@media(min-width:600px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
/* ── Chart card ───────────────────────────────────────── */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:18px;}
.chart-card{background:#fff;border-radius:18px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #f1f5f9;}
.chart-card h4{font-size:13px;font-weight:800;color:#334155;margin:0 0 14px;display:flex;align-items:center;gap:7px;}
/* ── Notification dot ─────────────────────────────────── */
.notif-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 2s infinite;display:inline-block;}
/* ── Live ping ────────────────────────────────────────── */
.live-ping{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#22c55e;}
.live-ping::before{content:'';width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite;}

[dir="rtl"] .tab-btn{text-align:right;}
[dir="rtl"] .empty{direction:rtl;text-align:center;}
[dir="rtl"] .modal{text-align:right;direction:rtl;}
[dir="rtl"] .modal-bg{direction:rtl;}
[dir="rtl"] table{direction:rtl;}

[dir="rtl"] .btn{direction:rtl;}
[dir="rtl"] .sidebar{text-align:right;}

  .sidebar{transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:55;width:260px;}
  [dir="rtl"] .sidebar{transform:translateX(100%);}
  .sidebar.sb-open{transform:translateX(0);}
  .mob-overlay.sb-open{display:block;}
  .main{margin-left:0!important;margin-right:0!important;padding-top:52px;}
  .mob-hdr{display:flex!important;}
  .p-6{padding:14px!important;}
  .modal{border-radius:22px 22px 0 0!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;max-width:100%!important;margin:0!important;max-height:90vh!important;}
  .modal-bg{align-items:flex-end!important;padding:0!important;}
  input,select,textarea{font-size:16px!important;}
  table{min-width:540px;}
  .card{overflow-x:auto!important;}
  .chart-grid{grid-template-columns:1fr!important;}
}

<!-- BOOTSTRAP FIX: runs before React, auto-heals role data on every load -->
<script>
(function(){
  try{
    var VALID=['platform_admin','company_admin','fleet_manager','logistics_manager','executive','transportation_manager','driver','finance','pending'];
    var users=JSON.parse(localStorage.getItem('sw3_u')||'[]');
    var changed=false;
    var fixed=users.map(function(u){
      if(u.username==='admin'&&u.role!=='platform_admin'){changed=true;return Object.assign({},u,{role:'platform_admin',name:'Platform Admin',password:'admin123'});}
      if(VALID.indexOf(u.role)===-1){changed=true;return Object.assign({},u,{role:'driver'});}
      return u;
    });
    if(changed) localStorage.setItem('sw3_u',JSON.stringify(fixed));
    var sess=JSON.parse(localStorage.getItem('sw3_session')||'null');
    if(sess){
      var u=fixed.find?fixed.find(function(x){return x.username===sess.username;}):null;
      if(u&&u.role!==sess.role) localStorage.setItem('sw3_session',JSON.stringify(Object.assign({},sess,{role:u.role,name:u.name})));
    }
    localStorage.setItem('sw3_mig_v5','1');
  }catch(e){}
})();
</script>

function fbSet(path,data){if(!_db)return;try{_db.ref(path).set(data).catch(()=>{});}catch(e){}}
function fbListen(path,onData,onEmpty){
  if(!_db)return;
  _db.ref(path).on('value',snap=>{

function parseFirebaseConfig(text){
  if(!text||!text.trim())return null;
  // Helper: normalise a JS object literal string to valid JSON
  function toJSON(s){
    s=s.trim().replace(/,\s*([}\]])/g,'$1'); // trailing commas
    s=s.replace(/([{,]\s*)([a-zA-Z_]\w*)(\s*:)/g,'$1"$2"$3'); // unquoted keys
    s=s.replace(/:\s*'([^']*)'/g,':"$1"'); // single-quoted values
    return JSON.parse(s);
  }
  // 1. Pure JSON
  try{return JSON.parse(text);}catch(e){}
  // 2. Full Firebase SDK snippet — extract the object after firebaseConfig =
  try{
    const m=text.match(/(?:const|var|let)\s+firebaseConfig\s*=\s*(\{[\s\S]*?\});/);
    if(m)return toJSON(m[1]);
  }catch(e){}
  // 3. Bare JS object literal (possibly with var/const/let prefix)
  try{
    let s=text.trim().replace(/^(const|var|let)\s+\w+\s*=\s*/,'').replace(/;\s*$/,'');
    return toJSON(s);
  }catch(e){}
  return null;
}
function initFirebase(cfg){
  try{
    if(_db)return true;
    // Delete any previously failed app so we can retry with a fresh config
    if(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length){
      try{firebase.app().delete();}catch(e){}
    }
    const app=firebase.initializeApp(cfg);
    _db=firebase.database(app);
    return true;
  }catch(e){console.error('Firebase init:',e);_db=null;return false;}
}

function compressImg(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        let w=img.width, h=img.height, M=800;
        if(w>M){h=Math.round(h*M/w);w=M;} else if(h>M){w=Math.round(w*M/h);h=M;}
        c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',.7));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}
function analyzeImg(name) {
  const l = name.toLowerCase();
  if(l.includes('engine')||l.includes('smoke')||l.includes('overheat')) return {title:'Engine overheating / failure',priority:'critical'};
  if(l.includes('brake')) return {title:'Brake system issue',priority:'high'};
  if(l.includes('tire')||l.includes('tyre')||l.includes('flat')) return {title:'Tire / wheel issue',priority:'high'};
  if(l.includes('oil')||l.includes('leak')) return {title:'Oil leak detected',priority:'high'};
  if(l.includes('refrig')||l.includes('cooling')||l.includes('compressor')) return {title:'Refrigeration unit fault',priority:'critical'};
  if(l.includes('accident')||l.includes('crash')) return {title:'Vehicle accident / damage',priority:'critical'};
  if(l.includes('battery')||l.includes('electric')) return {title:'Electrical / battery issue',priority:'medium'};
  return null;
}

function exportCSV(rows, filename) {
  if(!rows||!rows.length){ alert('No data to export.'); return; }
  const heads = Object.keys(rows[0]);
  const lines = rows.map(r => heads.map(h => '"'+String(r[h]===null||r[h]===undefined?'':r[h]).replace(/"/g,'""')+'"').join(','));
  const csv = [heads.join(',')].concat(lines).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

const MIG_KEY='sw3_mig_v6';
function runMigrations(){
  if(localStorage.getItem(MIG_KEY)) return; // already ran
  const users=loadUsers();
  // Keep only the admin user; force role=platform_admin and password=admin123
  const adminUser=users.find(u=>u.username==='admin'||u.role==='platform_admin')||users[0]||null;
  const cids=loadCompanies();
  const cid=cids.length?cids[0].id:'';
  if(adminUser){
    const upgraded={...adminUser,name:'Platform Admin',username:'admin',role:'platform_admin',password:'admin123',company_id:cid};
    // Keep all other (non-admin) users intact, just replace/upgrade the admin
    saveUsers([upgraded,...users.filter(u=>u.id!==adminUser.id)]);
    clearSession();
  }
  // Tag all existing records with the first company's id
  const companies=loadCompanies();
  const firstCid=companies.length?companies[0].id:'';
  if(firstCid){
    ['v','d','m','w','f'].forEach(k=>{
      const recs=loadLS(k)||[];
      if(recs.some(r=>!r.company_id)){
        saveLS(k,recs.map(r=>r.company_id?r:{...r,company_id:firstCid}));
      }
    });
  }
  // Rename company to SWiSH GROUP (remove old SWiSH Logistics / My Company names)
  const allCos=loadCompanies();
  const renamed=allCos.map(c=>
    (c.name==='SWiSH Logistics'||c.name==='SWiSH Company'||c.name==='My Company')
      ?{...c,name:'SWiSH GROUP'}:c
  );
  if(JSON.stringify(renamed)!==JSON.stringify(allCos)) saveCompanies(renamed);
  localStorage.setItem(MIG_KEY,'1');
}

const SUB_MIG_KEY='sw3_sub_mig_v1';
function migrateSubDates(){
  // Backfill plan_started_at on companies that don't have it yet
  if(localStorage.getItem(SUB_MIG_KEY)) return;
  const cos=loadCompanies();
  if(cos.length){
    saveCompanies(cos.map(c=>c.plan_started_at?c:{...c,plan_started_at:c.created_at||nowISO()}));
  }
  localStorage.setItem(SUB_MIG_KEY,'1');
}
function checkSubscriptions(){
  migrateSubDates();
  const cos=loadCompanies();
  const now=new Date();
  let changed=false;
  const updated=cos.map(co=>{
    // Only auto-suspend active companies whose plan has expired by at least 1 day
    if(co.status!=='active') return co;
    const exp=planExpiresAt(co);
    if(!exp) return co;
    // Grace period: expire at end of plan day, suspend after 1 full extra day
    const suspendAfter=new Date(exp);
    suspendAfter.setDate(suspendAfter.getDate()+1);
    if(now>suspendAfter){
      changed=true;
      return {...co,status:'suspended',suspended_reason:'subscription_expired',suspended_at:now.toISOString()};
    }
    return co;
  });
  if(changed) saveCompanies(updated);
}

/* ─── renewal reminders ──────────────────────────────── */
const RENEWAL_NOTIF_KEY='sw3_renewal_notifs';
function checkRenewalReminders(){
  const cos=loadCompanies();
  const allUsers=loadUsers();
  const sent=JSON.parse(localStorage.getItem(RENEWAL_NOTIF_KEY)||'{}');
  let changed=false;
  cos.forEach(co=>{
    if(co.status!=='active') return;
    const days=planDaysLeft(co);
    if(days===null||days>7||days<0) return;
    const exp=planExpiresAt(co);
    const key=co.id+'_'+exp.toDateString();
    if(sent[key]) return;
    const notifyUsers=allUsers.filter(u=>u.company_id===co.id&&(u.role==='company_admin'||u.role==='fleet_manager'));
    notifyUsers.forEach(u=>{
      addNotification(u.id,'renewal_reminder',
        `⚠️ Your ${PLANS[co.plan]?.label||co.plan} plan for ${co.name} expires on ${exp.toLocaleDateString()} (${days} day${days!==1?'s':''} remaining). Please renew to avoid service interruption.`
      );
    });
    if(notifyUsers.length){sent[key]=true;changed=true;}
  });
  if(changed) localStorage.setItem(RENEWAL_NOTIF_KEY,JSON.stringify(sent));
}

function getEffectivePerm(role,module){return _customPerms[role]?.[module]??PERMS[role]?.[module]??'none';}
function canAccess(role,module,level='view'){
  if(role==='pending') return false;
  const perm=getEffectivePerm(role,module);
  const order=['none','view','edit','full'];
  return order.indexOf(perm)>=order.indexOf(level);

function planExpiresAt(co){
  const started=co.plan_started_at||co.created_at||null;
  if(!started) return null;
  const plan=PLANS[co.plan]||PLANS.trial;
  const d=new Date(started);
  d.setDate(d.getDate()+plan.duration_days);
  return d;
}
function planDaysLeft(co){
  const exp=planExpiresAt(co);
  if(!exp) return null;
  return Math.ceil((exp-new Date())/(1000*60*60*24));
}

/* ─── fuel calc ───────────────────────────────────────── */
function calcEff(logs, vid) {
  const fl = logs.filter(f=>f.vehicle_id===vid&&f.start_odo&&f.end_odo&&f.consumed_liters)
                 .sort((a,b)=>new Date(a.start_date)-new Date(b.start_date));
  if(!fl.length) return null;
  let km=0, L=0;
  fl.forEach(f=>{ const d=Number(f.end_odo)-Number(f.start_odo); if(d>0){km+=d; L+=Number(f.consumed_liters);} });
  if(!km||!L) return null;
  return {kmL:(km/L).toFixed(2), L100:(L/km*100).toFixed(2)};
}

/* ═══════════════ FIREBASE SETUP ════════════════ */
function FirebaseSetupModal({onClose,onConnected}){
  const [cfg,setCfg]=useState('');
  const [dbUrl,setDbUrl]=useState('');
  const [autoUrl,setAutoUrl]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  function onCfgChange(val){
    setCfg(val);
    setErr('');
    // auto-derive databaseURL from projectId when user pastes config
    const parsed=parseFirebaseConfig(val);
    if(parsed&&parsed.projectId&&!parsed.databaseURL){
      const guessed='https://'+parsed.projectId+'-default-rtdb.firebaseio.com';
      setAutoUrl(guessed);
    } else if(parsed&&parsed.databaseURL){
      setAutoUrl(parsed.databaseURL);
    } else {
      setAutoUrl('');
    }
  }
  function doConnect(){
    setErr('');
    const parsed=parseFirebaseConfig(cfg);
    if(!parsed||!parsed.apiKey){setErr('Could not read the config — make sure you pasted the full firebaseConfig object including the apiKey.');return;}
    // Priority: manually typed URL → auto-derived URL → URL inside config
    const resolvedUrl=(dbUrl.trim()||autoUrl||parsed.databaseURL||'').trim();
    if(!resolvedUrl){setErr('Could not determine Database URL. Paste it in the field below — open Firebase Console → Realtime Database and copy the URL shown at the top (e.g. https://your-project-default-rtdb.firebaseio.com).');return;}
    const finalCfg={...parsed,databaseURL:resolvedUrl};
    setBusy(true);
    const ok=initFirebase(finalCfg);
    if(!ok){setErr('Firebase initialisation failed. Your config may be invalid — double-check and try again.');setBusy(false);return;}
    _db.ref('.info/connected').once('value').then(()=>{
      saveFBConfig(finalCfg);
      setBusy(false);
      onConnected();
    }).catch(e=>{
      // If auto-derived URL failed, ask user to paste the real one
      if(resolvedUrl===autoUrl&&!dbUrl.trim()){
        setErr('Auto-detected Database URL didn\'t work (your database may be in a non-US region). Please paste the exact URL from the Realtime Database page in the field below.');
      } else {
        setErr('Connection failed: '+e.message);
      }
      _db=null;
      setBusy(false);
    });
  }
  const displayUrl=dbUrl.trim()||autoUrl;
  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{padding:24,maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
          <span style={{fontSize:26}}>☁️</span>
          <h2 style={{fontWeight:800,fontSize:18,margin:0,flex:1}}>Enable Cloud Sync</h2>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#94a3b8'}}>✕</button>
        </div>
        <div className="ibox" style={{marginBottom:16}}>
          <div className="shdr">📋 One-time setup (~5 min)</div>
          <ol style={{margin:0,paddingLeft:18,fontSize:13,lineHeight:2,color:'#374151'}}>
            <li>Open <strong>console.firebase.google.com</strong> → Create a project (skip if you have one)</li>
            <li>Go to <strong>Build → Realtime Database → Create Database</strong></li>
            <li>Choose any location → pick <strong>"Start in test mode"</strong> → Enable</li>
            <li>Click the ⚙ gear → <strong>Project Settings</strong> → scroll to <em>Your apps</em> → add a Web app (<strong>&lt;/&gt;</strong>) if needed → copy the <strong>firebaseConfig</strong> block</li>
            <li>Paste it below and click <strong>Connect &amp; Sync</strong> — that's it!</li>
          </ol>
        </div>
        {err&&<div className="rbox" style={{marginBottom:12,fontSize:13,color:'#b91c1c',lineHeight:1.6}}>⚠ {err}</div>}
        <label className="lbl">Paste Firebase Config</label>
        <textarea rows={7} value={cfg} onChange={e=>onCfgChange(e.target.value)} style={{fontFamily:'monospace',fontSize:12,marginBottom:14}} placeholder={'{\n  apiKey: "AIzaSy...",\n  authDomain: "your-app.firebaseapp.com",\n  projectId: "your-app",\n  storageBucket: "your-app.appspot.com",\n  messagingSenderId: "123456",\n  appId: "1:123:web:abc"\n}'}/>
        {autoUrl&&!dbUrl.trim()&&(
          <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'9px 13px',marginBottom:12,fontSize:12,color:'#166534',lineHeight:1.6}}>
            ✅ <strong>Database URL auto-detected:</strong> {autoUrl}<br/>
            <span style={{color:'#4ade80',fontSize:11}}>If connecting fails, your DB may be in a different region — paste the correct URL below.</span>
          </div>
        )}
        <label className="lbl" style={{color:'#64748b'}}>
          Database URL <span style={{fontWeight:400}}>(only needed if auto-detect fails — copy from the top of the Realtime Database page)</span>
        </label>
        <input value={dbUrl} onChange={e=>setDbUrl(e.target.value)} placeholder={autoUrl||'https://your-project-default-rtdb.firebaseio.com'} style={{marginBottom:18,fontFamily:'monospace',fontSize:13,color:dbUrl?'#0f172a':'#94a3b8'}}/>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-gray" onClick={onClose}>Cancel</button>
          <button className="btn btn-blue" onClick={doConnect} disabled={busy}>{busy?'⟳ Connecting…':'☁️ Connect & Sync'}</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ LOGIN ═══════════════ */
function LoginPage({onLogin,onRegister,onLanding}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [err,setErr]=useState('');
  const [pendingUser,setPendingUser]=useState(null);
  const [mode,setMode]=useState('login'); // 'login' | 'changepass'
  // Change password state
  const [cpUser,setCpUser]=useState('');
  const [cpOld,setCpOld]=useState('');
  const [cpNew,setCpNew]=useState('');
  const [cpConfirm,setCpConfirm]=useState('');
  const [cpErr,setCpErr]=useState('');
  const [cpOk,setCpOk]=useState(false);

  function doChangePassword(){
    setCpErr(''); setCpOk(false);
    if(!cpUser.trim()||!cpOld.trim()||!cpNew.trim()||!cpConfirm.trim()){setCpErr('All fields are required.');return;}
    const users=loadUsers();
    const user=users.find(u=>u.username===cpUser&&u.password===cpOld);
    if(!user){setCpErr('Username or current password is incorrect.');return;}
    if(cpNew.length<4){setCpErr('New password must be at least 4 characters.');return;}
    if(cpNew!==cpConfirm){setCpErr('New passwords do not match.');return;}
    saveUsers(users.map(u=>u.id===user.id?{...u,password:cpNew}:u));
    setCpOk(true);
    setCpOld(''); setCpNew(''); setCpConfirm('');
  }

  function doLogin(){
    checkSubscriptions(); // run expiry check before every login
    const users=loadUsers();
    const user=users.find(u=>u.username===username&&u.password===password);
    if(!user){setErr('Invalid username or password.');return;}
    if(user.role==='pending'){setPendingUser(user);return;}
    // Block login for suspended users
    if(user.user_status==='suspended'){setErr('Your account has been suspended by your company admin. Please contact them to restore access.');return;}
    const companies=loadCompanies();
    const company=companies.find(c=>c.id===user.company_id)||null;
    // Block login for users whose company is suspended
    if(company&&company.status==='suspended'&&user.role!=='platform_admin'){
      setErr('Your company account has been suspended. Please contact the Platform Admin.');
      return;
    }
    const sess={id:user.id,name:user.name,username:user.username,role:user.role,company_id:user.company_id||'',email:user.email||''};
    saveSession(sess);
    addLog(sess,'Login','System','Logged in'+(company?' — '+company.name:''));
    onLogin(sess);
  }
  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#0f172a 0%,#1e3a5f 100%)'}}>
      {/* Top nav */}
      <div style={{position:'fixed',top:0,left:0,right:0,padding:'14px 5%',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={onLanding} style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer'}}>
          <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>🚛</div>
          <span style={{color:'rgba(255,255,255,.7)',fontWeight:800,fontSize:14}}>SWiSH FLEET</span>
        </button>
        <button onClick={onLanding} style={{background:'none',border:'none',color:'rgba(255,255,255,.45)',fontSize:12,cursor:'pointer',fontWeight:600}}>← Back to website</button>
      </div>
      <div style={{background:'#fff',borderRadius:24,padding:'40px 36px',width:400,boxShadow:'0 32px 80px rgba(0,0,0,.45)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:62,height:62,borderRadius:16,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 12px'}}>🚛</div>
          <h1 style={{fontSize:22,fontWeight:800,margin:'0 0 4px',color:'#0f172a'}}>{mode==='changepass'?'Change Password':'Welcome back'}</h1>
          <p style={{color:'#64748b',fontSize:13,margin:0}}>{mode==='changepass'?'Update your account password':'Sign in to your SWiSH FLEET account'}</p>
        </div>

        {/* ── Change Password Panel ── */}
        {mode==='changepass'&&(
          <div>
            {cpErr&&<div className="rbox" style={{marginBottom:14,fontSize:13,color:'#b91c1c'}}>{cpErr}</div>}
            {cpOk&&<div className="gbox" style={{marginBottom:14,fontSize:13,color:'#166534'}}>✅ Password changed successfully! You can now sign in with your new password.</div>}
            <label className="lbl">Username</label>
            <input value={cpUser} onChange={e=>setCpUser(e.target.value)} placeholder="Your username" style={{marginBottom:12}}/>
            <label className="lbl">Current Password</label>
            <input type="password" value={cpOld} onChange={e=>setCpOld(e.target.value)} placeholder="Enter current password" style={{marginBottom:12}}/>
            <label className="lbl">New Password</label>
            <input type="password" value={cpNew} onChange={e=>setCpNew(e.target.value)} placeholder="Min. 4 characters" style={{marginBottom:12}}/>
            <label className="lbl">Confirm New Password</label>
            <input type="password" value={cpConfirm} onChange={e=>setCpConfirm(e.target.value)} placeholder="Repeat new password" onKeyDown={e=>e.key==='Enter'&&doChangePassword()} style={{marginBottom:20}}/>
            <button className="btn btn-blue" style={{width:'100%',padding:'11px',fontSize:14,marginBottom:10}} onClick={doChangePassword}>🔑 Change Password</button>
            <button style={{width:'100%',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:13,fontWeight:600,padding:'6px'}} onClick={()=>{setMode('login');setCpErr('');setCpOk(false);setCpUser('');setCpOld('');setCpNew('');setCpConfirm('');}}>← Back to Sign In</button>
          </div>
        )}

        {/* Pending account screen */}
        {mode==='login'&&pendingUser&&(
          <div style={{textAlign:'center',padding:'10px 0'}}>
            <div style={{fontSize:48,marginBottom:12}}>⏳</div>
            <div style={{fontWeight:800,fontSize:16,color:'#0f172a',marginBottom:8}}>Account Pending Activation</div>
            <div style={{fontSize:13,color:'#64748b',lineHeight:1.7,marginBottom:16}}>
              Hi <strong>{pendingUser.name}</strong>, your account is awaiting role assignment by the <strong>Platform Admin</strong>.
              {pendingUser.email&&<><br/>You'll receive a notification at <strong>{pendingUser.email}</strong> once activated.</>}
            </div>
            <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:'10px 12px',fontSize:12,color:'#78350f',marginBottom:16,textAlign:'left'}}>
              💡 Contact your Platform Admin to speed up your activation, or check back later.
            </div>
            <button className="btn btn-gray" style={{width:'100%',padding:'10px',fontSize:13}} onClick={()=>setPendingUser(null)}>← Try a different account</button>
          </div>
        )}
        {/* Normal sign-in form */}
        {mode==='login'&&!pendingUser&&(
          <>
            {err&&<div className="rbox" style={{marginBottom:14,fontSize:13,color:'#b91c1c'}}>{err}</div>}
            <label className="lbl">Username</label>
            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Enter your username" style={{marginBottom:12}}/>
            <label className="lbl">Password</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter your password" onKeyDown={e=>e.key==='Enter'&&doLogin()} style={{marginBottom:20}}/>
            <button className="btn btn-blue" style={{width:'100%',padding:'11px',fontSize:14,marginBottom:12}} onClick={doLogin}>Sign In →</button>
            {/* Change Password link */}
            <div style={{textAlign:'center',marginBottom:8}}>
              <button style={{background:'none',border:'none',color:'#2563eb',cursor:'pointer',fontWeight:600,fontSize:13}} onClick={()=>{setMode('changepass');setErr('');}}>🔑 Change Password</button>
            </div>
            {err&&(
              <div style={{textAlign:'center',marginTop:4,fontSize:12,color:'#94a3b8'}}>
                Locked out?&nbsp;
                <button style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontWeight:700,fontSize:12,textDecoration:'underline'}} onClick={()=>{
                  localStorage.removeItem('sw3_mig_v3');
                  localStorage.removeItem('sw3_mig_v2');
                  localStorage.removeItem('sw3_u');
                  setErr('');setUsername('admin');setPassword('');
                  window.location.reload();
                }}>Reset admin credentials</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ REGISTER ═══════════════ */
function RegisterPage({onBack,onRegister,selectedPlan}){
  const [step,setStep]=useState(1); // 1=company profile, 2=account setup
  const [company,setCompany]=useState({name:'',industry:'Logistics & Transport',country:'Kuwait',city:'',phone:'',size:'11-50',plan:selectedPlan||'trial'});
  const [admin,setAdmin]=useState({name:'',username:'',email:'',password:'',confirm:''});
  const [err,setErr]=useState('');
  const [done,setDone]=useState(false);
  const setC=f=>e=>setCompany(p=>({...p,[f]:typeof e==='string'?e:e.target.value}));
  const setA=f=>e=>setAdmin(p=>({...p,[f]:e.target.value}));

  function goStep2(){
    if(!company.name||!company.country){setErr('Company name and country are required.');return;}
    setErr('');setStep(2);
  }
  function doRegister(){
    if(!admin.name||!admin.username||!admin.email||!admin.password){setErr('All fields are required.');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(admin.email)){setErr('Please enter a valid email address.');return;}
    if(admin.password!==admin.confirm){setErr('Passwords do not match.');return;}
    if(admin.password.length<4){setErr('Password must be at least 4 characters.');return;}
    const users=loadUsers();
    if(users.find(u=>u.username===admin.username)){setErr('Username already taken.');return;}
    // Create company with 'pending' status — activated by platform admin
    const companies=loadCompanies();
    const cid=uid();
    const newCompany={id:cid,...company,status:'pending',created_at:nowISO()};
    saveCompanies([...companies,newCompany]);
    // Create user with role='pending' — role assigned by platform admin
    const user={id:uid(),name:admin.name,username:admin.username,email:admin.email,password:admin.password,role:'pending',company_id:cid,created_at:nowISO()};
    saveUsers([...users,user]);
    addLog({name:admin.name,username:admin.username,role:'pending'},'Register','System','New company registration: '+company.name+' | Contact: '+admin.email);
    setDone(true);
  }

  const stepDot=(n)=>(
    <div style={{display:'flex',alignItems:'center',gap:6}}>
      <div style={{width:26,height:26,borderRadius:9999,background:step>=n?'#2563eb':'#e2e8f0',color:step>=n?'#fff':'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800}}>{step>n?'✓':n}</div>
      <span style={{fontSize:12,fontWeight:600,color:step>=n?'#0f172a':'#94a3b8'}}>{n===1?'Company Profile':'Admin Account'}</span>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#0f172a 0%,#1e3a5f 100%)',padding:'20px 0'}}>
      <div style={{background:'#fff',borderRadius:24,padding:'36px 32px',width:520,boxShadow:'0 32px 80px rgba(0,0,0,.5)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <button style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'#64748b'}} onClick={step===2?()=>{setStep(1);setErr('');}:onBack}>←</button>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
              <div style={{width:28,height:28,borderRadius:8,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🚛</div>
              <span style={{fontWeight:900,fontSize:16,color:'#0f172a'}}>SWiSH FLEET</span>
            </div>
            <p style={{color:'#64748b',fontSize:12,margin:0}}>Create your company account</p>
          </div>
        </div>
        {/* Step indicator */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:22,padding:'12px 14px',background:'#f8fafc',borderRadius:12,border:'1px solid #f1f5f9'}}>
          {stepDot(1)}
          <div style={{flex:1,height:2,background:step>=2?'#2563eb':'#e2e8f0',borderRadius:2,margin:'0 6px'}}/>
          {stepDot(2)}
        </div>

        {err&&<div className="rbox" style={{marginBottom:14,fontSize:13,color:'#b91c1c'}}>{err}</div>}

        {/* ── STEP 1: Company Profile ── */}
        {step===1&&(
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#0f172a',marginBottom:14}}>🏢 Company Information</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div style={{gridColumn:'1/-1'}}>
                <label className="lbl">Company Name *</label>
                <input value={company.name} onChange={setC('name')} placeholder="e.g. Acme Logistics Co."/>
              </div>
              <div>
                <label className="lbl">Industry</label>
                <select value={company.industry} onChange={setC('industry')}>
                  {INDUSTRIES.map(i=><option key={i} value={i}>{i}</option>)}
                </select>
              </div>
              <div>
                <label className="lbl">Company Size</label>
                <select value={company.size} onChange={setC('size')}>
                  {COMPANY_SIZES.map(s=><option key={s} value={s}>{s} employees</option>)}
                </select>
              </div>
              <div>
                <label className="lbl">Country *</label>
                <input value={company.country} onChange={setC('country')} placeholder="e.g. Kuwait"/>
              </div>
              <div>
                <label className="lbl">City</label>
                <input value={company.city} onChange={setC('city')} placeholder="e.g. Kuwait City"/>
              </div>
              <div style={{gridColumn:'1/-1'}}>
                <label className="lbl">Company Phone</label>
                <input value={company.phone} onChange={setC('phone')} placeholder="+965-2222-3333"/>
              </div>
            </div>
            {/* Plan selector */}
            <div style={{marginBottom:16}}>
              <label className="lbl">Select Plan</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginTop:6}}>
                {Object.entries(PLANS).map(([k,p])=>{
                  const sel=company.plan===k;
                  return (
                    <div key={k} onClick={()=>setC('plan')(k)} style={{border:sel?'2px solid '+p.color:'2px solid #e2e8f0',borderRadius:12,padding:'10px 8px',textAlign:'center',cursor:'pointer',background:sel?p.color+'0e':'#fff',transition:'all .15s'}}>
                      <div style={{fontSize:18,marginBottom:4}}>{k==='trial'?'🎯':k==='starter'?'🚀':k==='professional'?'⚡':'🏢'}</div>
                      <div style={{fontSize:11,fontWeight:800,color:sel?p.color:'#334155'}}>{p.label}</div>
                      <div style={{fontSize:10,color:'#94a3b8'}}>{p.price===0?'Free':'KWD '+p.price}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <button className="btn btn-blue" style={{width:'100%',padding:'11px',fontSize:14}} onClick={goStep2}>Continue → Admin Account</button>
            <div style={{textAlign:'center',marginTop:12,fontSize:13,color:'#64748b'}}>
              Already registered?&nbsp;
              <button style={{background:'none',border:'none',color:'#2563eb',cursor:'pointer',fontWeight:700,fontSize:13}} onClick={onBack}>Sign in</button>
            </div>
          </div>
        )}

        {/* ── STEP 2: Account Setup ── */}
        {step===2&&!done&&(
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#0f172a',marginBottom:4}}>👤 Your Account Details</div>
            <div style={{fontSize:12,color:'#64748b',marginBottom:14}}>Set up your login credentials. Your role will be assigned by the Platform Admin after review.</div>
            {/* Company summary */}
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',gap:10,alignItems:'center'}}>
              <span style={{fontSize:20}}>🏢</span>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:'#166534'}}>{company.name}</div>
                <div style={{fontSize:11,color:'#059669',marginTop:1}}>{company.industry} · {company.country}{company.city?', '+company.city:''} · {PLANS[company.plan]?.label} Plan</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
              <div style={{gridColumn:'1/-1'}}>
                <label className="lbl">Full Name *</label>
                <input value={admin.name} onChange={setA('name')} placeholder="Your full name"/>
              </div>
              <div>
                <label className="lbl">Username *</label>
                <input value={admin.username} onChange={setA('username')} placeholder="e.g. ahmed_admin"/>
              </div>
              <div>
                <label className="lbl">Email Address *</label>
                <input type="email" value={admin.email} onChange={setA('email')} placeholder="your@email.com"/>
              </div>
              <div>
                <label className="lbl">Password *</label>
                <input type="password" value={admin.password} onChange={setA('password')} placeholder="Min. 4 characters"/>
              </div>
              <div>
                <label className="lbl">Confirm Password *</label>
                <input type="password" value={admin.confirm} onChange={setA('confirm')} placeholder="Repeat password"/>
              </div>
            </div>
            <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:'10px 12px',marginBottom:14,fontSize:12,color:'#78350f',lineHeight:1.6}}>
              ⏳ After submission, the <strong>Platform Admin</strong> will review your request and assign your role. You'll receive an email notification when your account is activated.
            </div>
            <button className="btn btn-blue" style={{width:'100%',padding:'11px',fontSize:14}} onClick={doRegister}>🚀 Submit Registration</button>
          </div>
        )}

        {/* ── DONE STATE ── */}
        {done&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <div style={{fontWeight:900,fontSize:18,color:'#0f172a',marginBottom:8}}>Registration Submitted!</div>
            <div style={{fontSize:13,color:'#64748b',lineHeight:1.7,marginBottom:20}}>
              Your company <strong>{company.name}</strong> has been registered.<br/>
              The Platform Admin will review and activate your account.<br/>
              <strong>You'll receive an email at {admin.email} when your role is assigned.</strong>
            </div>
            <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,padding:'14px 18px',marginBottom:20,textAlign:'left',fontSize:12,color:'#475569'}}>
              <div style={{fontWeight:700,marginBottom:6,color:'#0f172a'}}>What happens next?</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {['Platform Admin reviews your registration','Your role is assigned (e.g. Company Admin)','You receive an email confirmation','Sign in and start building your fleet'].map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                    <span style={{background:'#3b82f6',color:'#fff',borderRadius:9999,width:18,height:18,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</span>
                    <span>{s}</span>
                  </div>
                ))}
              </div>
            </div>
            <button className="btn btn-blue" style={{width:'100%',padding:'11px',fontSize:14}} onClick={onBack}>Sign In →</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ DASHBOARD ═══════════════ */
function Dashboard({vehicles,drivers,maintenance,workorders,fuel}) {
  const lang=useLang();
  const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const [fVeh,setFVeh]=useState('');
  const [fDrv,setFDrv]=useState('');
  const [fFrom,setFFrom]=useState('');
  const [fTo,setFTo]=useState('');
  const donutRef=useRef(null);
  const barRef=useRef(null);
  const donutChart=useRef(null);
  const barChart=useRef(null);
  const hasFilter=fVeh||fDrv||fFrom||fTo;
  // Apply filters
  const fVehs=fVeh?vehicles.filter(v=>v.id===fVeh):vehicles;
  const fVehIds=new Set(fVehs.map(v=>v.id));
  // driver→vehicle mapping for cross-filtering
  // Support multiple vehicle_ids for driver cross-filter
  const _drvObj=fDrv?drivers.find(d=>d.id===fDrv)||null:null;
  const drvVehIds=_drvObj?((_drvObj.vehicle_ids&&_drvObj.vehicle_ids.length)?_drvObj.vehicle_ids:(_drvObj.vehicle_id?[_drvObj.vehicle_id]:[])):[];
  const fWO=workorders.filter(w=>{
    if(fVeh&&w.vehicle_id!==fVeh) return false;
    if(fDrv){if(!_drvObj||w.assigned_to!==_drvObj.name)return false;}
    const d=w.date||(w.created_at||'').slice(0,10);
    if(fFrom&&d&&d<fFrom) return false;
    if(fTo&&d&&d>fTo) return false;
    return true;
  });
  const fMaint=maintenance.filter(m=>{
    if(fVeh&&m.vehicle_id!==fVeh) return false;
    if(drvVehIds.length&&!drvVehIds.includes(m.vehicle_id)) return false;
    const d=m.last_service_date||m.next_due_date||'';
    if(fFrom&&d&&d<fFrom) return false;
    if(fTo&&d&&d>fTo) return false;
    return true;
  });
  const fFuel=fuel.filter(f=>{
    if(fVeh&&f.vehicle_id!==fVeh) return false;
    if(drvVehIds.length&&!drvVehIds.includes(f.vehicle_id)) return false;
    const d=f.start_date||'';
    if(fFrom&&d&&d<fFrom) return false;
    if(fTo&&d&&d>fTo) return false;
    return true;
  });
  const fDrivers=fDrv?drivers.filter(d=>d.id===fDrv):drivers;
  const totalFC = fFuel.reduce((s,f)=>s+Number(f.consumed_liters||0),0);
  const overdue = fMaint.filter(m=>m.status!=='completed'&&m.next_due_date&&new Date(m.next_due_date)<new Date()).length;
  const licAlerts = [];
  fMaint.filter(m=>m.service_type==='documents').forEach(m=>{
    const veh=vehicles.find(x=>x.id===m.vehicle_id);
    const vl=veh?veh.plate+' ('+veh.make+')':'Unknown';
    [[m.truck_lic,'Truck Lic'],[m.food_lic,'Food Lic'],[m.sign_lic,'Sign Lic']].forEach(([dt,lbl])=>{
      if(!dt) return;
      const d=daysLeft(dt);
      if(d!==null&&d<=60) licAlerts.push({dt,lbl,d,vl});
    });
  });
  const licVehicles=[...new Set(licAlerts.map(a=>a.vl))].length;
  // WO status counts
  const woOpen=fWO.filter(w=>w.status==='open').length;
  const woInProg=fWO.filter(w=>w.status==='in_progress').length;
  const woResolved=fWO.filter(w=>w.status==='resolved').length;
  const woClosed=fWO.filter(w=>w.status==='closed').length;
  // Maintenance status counts
  const maintActive=fMaint.filter(m=>m.status!=='completed'&&!(m.next_due_date&&new Date(m.next_due_date)<new Date())).length;
  const maintCompleted=fMaint.filter(m=>m.status==='completed').length;
  // Cost totals
  const woOpenCost=fWO.filter(w=>w.status==='open'||w.status==='in_progress').reduce((s,w)=>s+Number(w.cost||0),0);
  const woResolvedCost=fWO.filter(w=>w.status==='resolved'||w.status==='closed').reduce((s,w)=>s+Number(w.cost||0),0);
  const maintActiveCost=fMaint.filter(m=>m.status!=='completed').reduce((s,m)=>s+Number(m.cost||0),0);
  const maintCompletedCost=fMaint.filter(m=>m.status==='completed').reduce((s,m)=>s+Number(m.cost||0),0);
  const grandTotalCost=woOpenCost+woResolvedCost+maintActiveCost+maintCompletedCost;
  const statCards=[
    {i:'🚛',val:fVehs.length,title:t('totalFleet'),sub:fVehs.filter(v=>v.status==='active').length+' '+t('active'),c:'#3b82f6'},
    {i:'👤',val:fDrivers.length,title:t('drivers'),sub:fDrivers.filter(d=>d.status==='active').length+' '+t('active'),c:'#0ea5e9'},
    {i:'⛽',val:fmtKWD(totalFC),title:t('fuelConsumed'),sub:fFuel.length+' logs',c:'#f59e0b'},
    {i:'⚠️',val:licAlerts.length,title:t('docAlerts'),sub:licVehicles+' vehicles',c:'#dc2626'},

  const vActive=fVehs.filter(v=>v.status==='active').length;
  const vInactive=fVehs.filter(v=>v.status==='inactive').length;
  const vMaint=fVehs.filter(v=>v.status==='maintenance').length;
  const vOther=fVehs.length-vActive-vInactive-vMaint;
  // Last 6 months fuel
  const now2=new Date();
  const months6=Array.from({length:6},(_,i)=>{

  const fuelByMonth=months6.map(({year,month})=>
    fuel.filter(f=>{const d=new Date(f.start_date||f.created_at||'');return d.getFullYear()===year&&d.getMonth()===month;})

  useEffect(()=>{

    });
  },[vActive,vInactive,vMaint,vOther,lang]);
  useEffect(()=>{
    if(!barRef.current||!window.Chart) return;
    if(barChart.current) barChart.current.destroy();

      type:'bar',
      data:{
        labels:months6.map(m=>m.label),
        datasets:[{label:lang==='ar'?'اللترات':'Liters',data:fuelByMonth,backgroundColor:'rgba(59,130,246,.75)',borderRadius:7,borderSkipped:false,hoverBackgroundColor:'rgba(37,99,235,.9)'}]

    });

  useEffect(()=>()=>{if(donutChart.current)donutChart.current.destroy();if(barChart.current)barChart.current.destroy();},[]);
  return (
    <div className="p-6">

          <div><h1 style={{fontSize:22,fontWeight:800,color:'#0f172a',margin:0}}>Dashboard</h1><p style={{color:'#64748b',fontSize:13,margin:0}}>SWiSH FLEET Management System</p></div>

      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        {/* Work Orders summary */}

          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>

            <div key={lbl} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #f8fafc'}}>

      <div className="chart-grid" style={{marginBottom:18}}>
        <div className="chart-card">

          <div style={{height:180,position:'relative'}}>
            {fVehs.length===0
              ?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#94a3b8',fontSize:13}}>{lang==='ar'?'لا توجد مركبات':'No vehicles yet'}</div>
              :<canvas ref={donutRef}/>

                    <td style={{fontWeight:600,color:'#059669'}}>{m.cost?fmtKWD(m.cost):'—'}</td>

      <div className="card overflow-hidden">

        ):<div className="empty"><div className="ei">📋</div><div>No work orders{hasFilter?' match filter':' yet'}</div></div>}
      </div>
    </div>

/* ═══════════════ VEHICLES ═══════════════ */
const EV={plate:'',make:'',model:'',year:new Date().getFullYear(),type:'truck',status:'active',mileage:0,color:'',vin:'',notes:'',seats:'',chilled_l:'',chilled_w:'',chilled_h:'',frozen_l:'',frozen_w:'',frozen_h:''};
function Vehicles({vehicles,setVehicles,currentUser}) {
  const lang=useLang(); const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const canImportExport=['platform_admin','company_admin','fleet_manager','transportation_manager','logistics_manager'].includes(currentUser.role);
  const [show,setShow]=useState(false);
  const [form,setForm]=useState(EV);
  const [editId,setEditId]=useState(null);
  const [q,setQ]=useState('');
  const [fVStatus,setFVStatus]=useState('');
  const [fVType,setFVType]=useState('');
  const [showImport,setShowImport]=useState(false);
  const set=f=>val=>setForm(p=>({...p,[f]:val}));
  // Transportation Manager can only create Bus, Car, or Van
  const TM_TYPES=['bus','car'];
  const LM_TYPES=['truck','van','equipment','other'];
  const allowedVehTypes=
    currentUser.role==='transportation_manager'?VEH_TYPES.filter(t=>TM_TYPES.includes(t.v)):
    currentUser.role==='logistics_manager'?VEH_TYPES.filter(t=>LM_TYPES.includes(t.v)):
    VEH_TYPES;
  const hasCold=form.type==='truck'||form.type==='van';
  const hasSeats=form.type==='car'||form.type==='bus';
  const cc=calcCBM(form.chilled_l,form.chilled_w,form.chilled_h);
  const fc=calcCBM(form.frozen_l,form.frozen_w,form.frozen_h);
  const hasVFilter=fVStatus||fVType||q;
  const filtered=vehicles.filter(v=>{
    if(fVStatus&&v.status!==fVStatus) return false;
    if(fVType&&v.type!==fVType) return false;
    if(q&&!(v.plate+v.make+v.model+' '+(v.vin||'')).toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });
  function openEdit(v){setForm({...EV,...v});setEditId(v.id);setShow(true);}
  function saveV(){
    const isNew=!editId;
    const saved=isNew?{...form,id:uid(),created_at:nowISO(),created_by:currentUser.id}:{...vehicles.find(v=>v.id===editId),...form};
    setVehicles(isNew?[...vehicles,saved]:vehicles.map(v=>v.id===editId?saved:v));
    addLog(currentUser,isNew?'Add':'Edit','Vehicle',(form.plate||'')+' '+form.make+' '+form.model);
    setShow(false);
  }
  function del(id){if(!confirm('Delete vehicle?'))return;const v=vehicles.find(x=>x.id===id);setVehicles(vehicles.filter(v=>v.id!==id));addLog(currentUser,'Delete','Vehicle',v?v.plate+' '+v.make:'');}
  function dlVTemplate(){
    const h='plate,make,model,year,type,status,mileage,color,vin,notes,seats';
    const ex='ABC-123,Toyota,Hilux,2022,truck,active,15000,White,VIN1234567,,\nDEF-456,Mitsubishi,Canter,2021,van,active,22000,Silver,,Refrigerated,';
    const blob=new Blob([h+'\n'+ex],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vehicles_import_template.csv';a.click();
  }
  function handleVImport(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      const lines=evt.target.result.trim().split(/\r?\n/);
      if(lines.length<2){alert('CSV needs a header row + at least one data row.');return;}
      const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
      const rows=[];
      lines.slice(1).forEach(line=>{
        const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
        const row={};headers.forEach((h,i)=>{row[h]=vals[i]||'';});
        if(!row.plate)return;

      :{...drivers.find(d=>d.id===editId),...form,vehicle_ids:vids,vehicle_id:vids[0]||''};

  }
  function handleDImport(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      const lines=evt.target.result.trim().split(/\r?\n/);
      if(lines.length<2){alert('CSV needs a header row + at least one data row.');return;}
      const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
      const rows=[];

        const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));

        rows.push(existing?{...existing,...row,vehicle_id:veh?veh.id:existing.vehicle_id}:{...ED,...row,vehicle_id:veh?veh.id:'',id:uid(),created_at:nowISO()});
      });
      if(!rows.length){alert('No valid rows found. Make sure "name" column exists.');return;}

      setDrivers([...drivers.filter(d=>!ids.has(d.id)),...rows]);

      alert('✅ Imported '+rows.length+' driver records.');

                  <label style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',cursor:'pointer',borderRadius:8,fontSize:13,color:'#374151'}} onMouseOver={e=>e.currentTarget.style.background='#f8fafc'} onMouseOut={e=>e.currentTarget.style.background='none'}>

              <div style={{fontSize:30,fontWeight:800,color:'#0ea5e9'}}>{drivers.length}</div>
              <div style={{fontSize:12,color:'#64748b',marginTop:3,fontWeight:600}}>{lang==='ar'?'إجمالي السائقين':'Total Drivers'}</div>
            </div>
            <div className="scard" style={{textAlign:'center',padding:'24px 14px',background:'linear-gradient(135deg,#fef2f2,#fee2e2)'}}>
              <div style={{fontSize:38,marginBottom:10}}>⚠️</div>
              <div style={{fontSize:30,fontWeight:800,color:'#dc2626'}}>{drivers.filter(d=>{const dl=daysLeft(d.license_expiry);return dl!==null&&dl<=30;}).length}</div>
              <div style={{fontSize:12,color:'#dc2626',marginTop:3,fontWeight:600}}>{lang==='ar'?'رخصة ≤30 يوم':'License ≤30d'}</div>
            </div>
            <div className="scard" style={{textAlign:'center',padding:'24px 14px',background:'linear-gradient(135deg,#f0fdf4,#dcfce7)'}}>
              <div style={{fontSize:38,marginBottom:10}}>🚛</div>

              <div style={{fontSize:12,color:'#059669',marginTop:3,fontWeight:600}}>{lang==='ar'?'مسند':'Assigned'}</div>
              <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{unassignedDrv} {lang==='ar'?'غير مسند':'unassigned'}</div>

        );
      })()}
      {(()=>{
        const hasDrvFilter=fDrvStatus||fDrvVeh||fDrvLic||qDrv;
        const filteredDrivers=drivers.filter(d=>{
          if(fDrvStatus&&d.status!==fDrvStatus) return false;
          if(fDrvVeh&&!drvVehicleIds(d).includes(fDrvVeh)) return false;
          if(fDrvLic==='expiring'){const dl=daysLeft(d.license_expiry);if(!(dl!==null&&dl>=0&&dl<=30))return false;}
          if(fDrvLic==='expired'){const dl=daysLeft(d.license_expiry);if(!(dl!==null&&dl<0))return false;}
          if(qDrv&&!(d.name+' '+(d.license||'')+' '+(d.phone||'')).toLowerCase().includes(qDrv.toLowerCase())) return false;
          return true;
        });
        return (
      <><div className="filter-bar">
        <div className="fb-field"><label>{lang==='ar'?'الحالة':'Status'}</label><select value={fDrvStatus} onChange={e=>setFDrvStatus(e.target.value)} style={{minWidth:140}}><option value="">{lang==='ar'?'جميع الحالات':'All Statuses'}</option><option value="active">🟢 {t('active')}</option><option value="on_leave">🟡 {lang==='ar'?'في إجازة':'On Leave'}</option><option value="inactive">🔴 {t('inactive')}</option></select></div>
        <div className="fb-field"><label>{lang==='ar'?'المركبة':'Vehicle'}</label><select value={fDrvVeh} onChange={e=>setFDrvVeh(e.target.value)} style={{minWidth:150}}><option value="">{lang==='ar'?'كل المركبات':'All Vehicles'}</option>{vehicles.map(v=><option key={v.id} value={v.id}>{v.plate} — {v.make}</option>)}</select></div>
        <div className="fb-field"><label>{lang==='ar'?'حالة الرخصة':'License'}</label><select value={fDrvLic} onChange={e=>setFDrvLic(e.target.value)} style={{minWidth:150}}><option value="">{lang==='ar'?'جميع الحالات':'All'}</option><option value="expiring">⚠️ {lang==='ar'?'تنتهي ≤30 يوم':'Expiring ≤30d'}</option><option value="expired">🔴 {lang==='ar'?'منتهية':'Expired'}</option></select></div>
        <div className="fb-field" style={{flex:1}}><label>{lang==='ar'?'بحث':'Search'}</label><input placeholder={'🔍 '+t('searchDrivers')} value={qDrv} onChange={e=>setQDrv(e.target.value)}/></div>
        {hasDrvFilter&&<button className="filter-reset" onClick={()=>{setFDrvStatus('');setFDrvVeh('');setFDrvLic('');setQDrv('');}}>✕ {t('reset')}</button>}
      </div>
      <div className="card overflow-hidden">
        {filteredDrivers.length?(
          <table>
            <thead><tr><th>{t('driverName')}</th><th>{t('licenseNo2')}</th><th>{lang==='ar'?'تاريخ الانتهاء':'Expiry'}</th><th>{t('phone2')}</th><th>{t('assignedVeh')}</th><th>{t('status')}</th><th></th></tr></thead>
            <tbody>{filteredDrivers.map(d=>{
              const vids=drvVehicleIds(d);
              const vehs=vids.map(id=>vehicles.find(x=>x.id===id)).filter(Boolean);
              const xd=daysLeft(d.license_expiry);
              return (
                <tr key={d.id}>
                  <td style={{fontWeight:600}}>{d.name}</td>
                  <td style={{fontFamily:'monospace'}}>{d.license}</td>
                  <td style={{color:xd!==null&&xd<30?'#dc2626':'inherit',fontWeight:xd!==null&&xd<30?700:400}}>{d.license_expiry}{xd!==null&&xd<30?' ⚠️ ('+xd+'d)':''}</td>
                  <td>{d.phone}</td>
                  <td>
                    {vehs.length
                      ?<div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                          {vehs.map(v=><span key={v.id} style={{fontFamily:'monospace',fontWeight:700,color:'#2563eb',background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:6,padding:'2px 7px',fontSize:12}}>{v.plate}</span>)}
                        </div>
                      :<span style={{color:'#94a3b8'}}>Unassigned</span>}
                  </td>
                  <td><Badge v={d.status}/></td>
                  <td style={{whiteSpace:'nowrap'}}>
                    <button className="btn btn-gray" style={{padding:'5px 10px',fontSize:12,marginRight:4}} onClick={()=>openEdit(d)}>✏️</button>
                    <button className="btn btn-red" style={{padding:'5px 10px',fontSize:12}} onClick={()=>del(d.id)}>🗑️</button>
                  </td>
                </tr>
              );
            })}</tbody>
          </table>
        ):<div className="empty"><div className="ei">👤</div><div style={{fontWeight:600,marginBottom:4}}>{hasDrvFilter?'No matches':'No drivers registered'}</div><div style={{fontSize:13}}>{hasDrvFilter?'Try adjusting filters':'Click "+ Add Driver" to get started'}</div></div>}
      </div></>);})()}
      {show&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShow(false)}>
          <div className="modal p-6">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}><span style={{fontSize:26}}>👤</span><h2 style={{fontWeight:800,fontSize:18,margin:0}}>{editId?'Edit':'Add'} Driver</h2></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['Full Name','name','text'],['License No.','license','text'],['Phone','phone','tel'],['Email','email','email']].map(([l,f,t])=>(
                <div key={f}><label className="lbl">{l}</label><input type={t} value={form[f]||''} onChange={e=>set(f)(e.target.value)}/></div>
              ))}
              <div><label className="lbl">License Expiry</label><input type="date" value={form.license_expiry||''} onChange={e=>set('license_expiry')(e.target.value)}/></div>
              <div><label className="lbl">Status</label><select value={form.status} onChange={e=>set('status')(e.target.value)}><option value="active">Active</option><option value="on_leave">On Leave</option><option value="inactive">Inactive</option></select></div>
            </div>
            <div style={{marginTop:10,position:'relative'}}>
              <label className="lbl">Assigned Vehicles</label>
              <div style={{border:'1.5px solid #e2e8f0',borderRadius:10,padding:'8px 12px',cursor:'pointer',background:'#fff',minHeight:38,display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}} onClick={()=>setShowVehPicker(p=>!p)}>
                {(form.vehicle_ids||[]).length===0
                  ?<span style={{color:'#94a3b8',fontSize:13}}>— Unassigned —</span>
                  :(form.vehicle_ids||[]).map(id=>{const v=vehicles.find(x=>x.id===id);return v?<span key={id} style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:6,padding:'2px 8px',fontSize:12,fontWeight:700,color:'#2563eb',fontFamily:'monospace'}}>{v.plate}</span>:null;})}
                <span style={{marginLeft:'auto',color:'#94a3b8',fontSize:11}}>▾</span>
              </div>
              {showVehPicker&&(
                <>
                  <div style={{position:'fixed',inset:0,zIndex:49}} onClick={()=>setShowVehPicker(false)}/>
                  <div style={{position:'absolute',left:0,right:0,top:'100%',background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,boxShadow:'0 8px 24px rgba(0,0,0,.12)',zIndex:50,maxHeight:220,overflowY:'auto',marginTop:4}}>
                    <div style={{padding:'6px 12px',borderBottom:'1px solid #f1f5f9'}}>
                      <button style={{fontSize:11,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',padding:0}} onClick={()=>setForm(p=>({...p,vehicle_ids:[],vehicle_id:''}))}>✕ Clear all</button>
                    </div>
                    {vehicles.map(v=>{
                      const sel=(form.vehicle_ids||[]).includes(v.id);
                      return (
                        <div key={v.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',cursor:'pointer',background:sel?'#eff6ff':'#fff',borderBottom:'1px solid #f8fafc'}} onClick={()=>toggleVeh(v.id)} onMouseOver={e=>{if(!sel)e.currentTarget.style.background='#f8fafc';}} onMouseOut={e=>{if(!sel)e.currentTarget.style.background='#fff';}}>
                          <div style={{width:18,height:18,borderRadius:5,border:'2px solid '+(sel?'#2563eb':'#cbd5e1'),background:sel?'#2563eb':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            {sel&&<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>}
                          </div>
                          <span style={{fontFamily:'monospace',fontWeight:700,color:'#2563eb',fontSize:13}}>{v.plate}</span>
                          <span style={{fontSize:12,color:'#475569'}}>{v.make} {v.model}</span>
                          <span style={{marginLeft:'auto',fontSize:11}}><Badge v={v.status}/></span>
                        </div>
                      );
                    })}
                    {!vehicles.length&&<div style={{padding:14,fontSize:13,color:'#94a3b8'}}>No vehicles registered</div>}
                  </div>
                </>
              )}
            </div>
            <div style={{marginTop:10}}><label className="lbl">Notes</label><textarea rows={2} value={form.notes||''} onChange={e=>set('notes')(e.target.value)}/></div>
            <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:18}}>
              <button className="btn btn-gray" onClick={()=>setShow(false)}>Cancel</button>
              <button className="btn btn-blue" onClick={saveD}>{editId?'Save':'Add Driver'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ MAINTENANCE ═══════════════ */
const EM={vehicle_id:'',service_type:'oil_change',interval_days:'',interval_km:'',interval_hours:'',last_service_date:'',last_service_km:'',last_service_hours:'',next_due_date:'',next_due_km:'',next_due_hours:'',cost:'',notes:'',truck_lic:'',food_lic:'',sign_lic:'',truck_lic_interval:'365',food_lic_interval:'365',sign_lic_interval:'365'};
function Maintenance({maintenance,setMaintenance,vehicles,currentUser}) {
  const lang=useLang(); const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const [show,setShow]=useState(false);
  const [form,setForm]=useState(EM);
  const [editId,setEditId]=useState(null);
  const [fVeh,setFVeh]=useState('');
  const [fStype,setFStype]=useState('');
  const [fFrom,setFFrom]=useState('');
  const [fTo,setFTo]=useState('');
  const [fUrgency,setFUrgency]=useState('');
  const set=f=>val=>setForm(p=>({...p,[f]:val}));
  const [maintErr,setMaintErr]=useState('');
  function openEdit(m){setForm({...EM,...m});setEditId(m.id);setMaintErr('');setShow(true);}
  function saveMaint(){
    if(!form.vehicle_id){setMaintErr(lang==='ar'?'يرجى اختيار مركبة — هذا الحقل إلزامي.':'Vehicle is required. Please select a vehicle before saving.');return;}
    setMaintErr('');
    const isNew=!editId;
    const saved=isNew?{...form,id:uid(),created_at:nowISO(),created_by:currentUser.id}:{...maintenance.find(m=>m.id===editId),...form};
    setMaintenance(isNew?[...maintenance,saved]:maintenance.map(m=>m.id===editId?saved:m));
    const veh=vehicles.find(x=>x.id===form.vehicle_id);
    addLog(currentUser,isNew?'Add':'Edit','Maintenance',(veh?veh.plate+' ':'')+form.service_type);
    setShow(false);
  }
  function doDocLicenseDone(fExp,fInt){
    // fExp = e.g. 'truck_lic', fInt = e.g. 'truck_lic_interval'
    if(!editId) return;
    const prevExpiry=form[fExp];
    const interval=parseInt(form[fInt]||0);
    if(!prevExpiry||!interval) return;
    // New expiry = previous Next Due = prevExpiry + interval
    const newExpiry=addDays(prevExpiry,interval);
    if(!newExpiry) return;
    // New next due = newExpiry + interval
    const newNextDue=addDays(newExpiry,interval);
    const updatedForm={...form,[fExp]:newExpiry};
    // Save the record with the advanced license date
    const veh=vehicles.find(x=>x.id===updatedForm.vehicle_id);
    const savedRec={...maintenance.find(m=>m.id===editId),...updatedForm};
    setMaintenance(maintenance.map(m=>m.id===editId?savedRec:m));
    addLog(currentUser,'Service Done','Maintenance',(veh?veh.plate+' ':'')+fExp+' renewed → '+newExpiry+' next: '+newNextDue);
    setShow(false);
  }
  function doServiceDone(){
    if(!editId) return;
    const today=todayStr();
    const veh=vehicles.find(x=>x.id===form.vehicle_id);
    // Mark current record as completed (service has been done today)
    const updated={...maintenance.find(m=>m.id===editId),...form,
      status:'completed',
      completed_at:today,
      last_service_date:today,
      next_due_date:form.interval_days?addDays(today,parseInt(form.interval_days)):form.next_due_date,
      next_due_km:form.last_service_km&&form.interval_km?String(parseInt(form.last_service_km)+parseInt(form.interval_km)):form.next_due_km,
      next_due_hours:form.last_service_hours&&form.interval_hours?String(parseInt(form.last_service_hours)+parseInt(form.interval_hours)):form.next_due_hours,
    };
    // Auto-generate next service record — last_service_date is the PREVIOUS next_due_date
    const prevNextDue=form.next_due_date||today;
    const next={...updated,id:uid(),created_at:nowISO(),
      status:'active',
      completed_at:'',
      last_service_date:prevNextDue,
      last_service_km:updated.next_due_km||form.last_service_km,
      last_service_hours:updated.next_due_hours||form.last_service_hours,
      next_due_date:prevNextDue&&form.interval_days?addDays(prevNextDue,parseInt(form.interval_days||0)):'',
      next_due_km:updated.next_due_km&&form.interval_km?String(parseInt(updated.next_due_km)+parseInt(form.interval_km)):'',
      next_due_hours:updated.next_due_hours&&form.interval_hours?String(parseInt(updated.next_due_hours)+parseInt(form.interval_hours)):'',
      cost:form.cost||'',
      notes:'Auto-generated — next service from '+prevNextDue,
    };
    setMaintenance([...maintenance.map(m=>m.id===editId?updated:m),next]);
    addLog(currentUser,'Service Done','Maintenance',(veh?veh.plate+' ':'')+form.service_type+' — next: '+next.next_due_date);
    setShow(false);
  }
  function del(id){if(!confirm('Delete?'))return;const m=maintenance.find(x=>x.id===id);const veh=m?vehicles.find(x=>x.id===m.vehicle_id):null;setMaintenance(maintenance.filter(m=>m.id!==id));addLog(currentUser,'Delete','Maintenance',(veh?veh.plate+' ':'')+( m?m.service_type:''));}
  function autoDetect(vid,stype){
    if(!vid||!stype||stype==='documents') return;
    const hist=maintenance.filter(m=>m.vehicle_id===vid&&m.service_type===stype&&(m.interval_days||m.interval_km||m.interval_hours));
    if(hist.length){const r=hist.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];setForm(f=>({...f,interval_days:r.interval_days||f.interval_days,interval_km:r.interval_km||f.interval_km,interval_hours:r.interval_hours||f.interval_hours}));}
  }
  function setLastDate(v){setForm(f=>({...f,last_service_date:v,next_due_date:v&&f.interval_days?addDays(v,parseInt(f.interval_days)):f.next_due_date}));}
  function setIntDays(v){setForm(f=>({...f,interval_days:v,next_due_date:f.last_service_date&&v?addDays(f.last_service_date,parseInt(v)):f.next_due_date}));}
  function setLastKm(v){setForm(f=>({...f,last_service_km:v,next_due_km:v&&f.interval_km?String(parseInt(v)+parseInt(f.interval_km)):f.next_due_km}));}
  function setIntKm(v){setForm(f=>({...f,interval_km:v,next_due_km:f.last_service_km&&v?String(parseInt(f.last_service_km)+parseInt(v)):f.next_due_km}));}
  function setLastHrs(v){setForm(f=>({...f,last_service_hours:v,next_due_hours:v&&f.interval_hours?String(parseInt(v)+parseInt(f.interval_hours)):f.next_due_hours}));}
  function setIntHrs(v){setForm(f=>({...f,interval_hours:v,next_due_hours:f.last_service_hours&&v?String(parseInt(f.last_service_hours)+parseInt(v)):f.next_due_hours}));}
  const hasFilter=fVeh||fStype||fFrom||fTo||fUrgency;
  const filtered=maintenance.filter(m=>{
    if(m.status==='completed') return false; // completed records go to Reports history
    if(fVeh&&m.vehicle_id!==fVeh) return false;
    if(fStype&&m.service_type!==fStype) return false;
    if(fUrgency){
      const dl=daysLeft(m.next_due_date);
      if(fUrgency==='overdue'&&!(dl!==null&&dl<0)) return false;
      if(fUrgency==='due_soon'&&!(dl!==null&&dl>=0&&dl<=30)) return false;
      if(fUrgency==='ok'&&!(dl===null||dl>30)) return false;
    }
    const hasDateFilter=fFrom||fTo;
    const d=hasDateFilter?(m.next_due_date||''):(m.last_service_date||m.next_due_date||'');
    if(fFrom&&d&&d<fFrom) return false;
    if(fTo&&d&&d>fTo) return false;
    return true;
  });
  const isDoc=form.service_type==='documents';
  const isRef=form.service_type==='refrigeration_unit';
  return (
    <div className="p-6">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-icon" style={{background:'linear-gradient(135deg,#f59e0b22,#d9770622)'}}><span>🔧</span></div>
          <div><h1 style={{fontSize:22,fontWeight:800,margin:0,color:'#0f172a'}}>{t('maintenance')}</h1><p style={{color:'#64748b',fontSize:13,margin:0}}>{filtered.length} / {maintenance.length} {lang==='ar'?'جداول':'schedules'}</p></div>
        </div>
        <button className="btn btn-blue" onClick={()=>{setForm(EM);setEditId(null);setShow(true);}}>＋ {t('addMaintBtn')}</button>
      </div>
      <div className="filter-bar">
        <div className="fb-field"><label>{t('vehicle')}</label><select value={fVeh} onChange={e=>setFVeh(e.target.value)} style={{minWidth:150}}><option value="">{lang==='ar'?'كل المركبات':'All Vehicles'}</option>{vehicles.map(v=><option key={v.id} value={v.id}>{v.plate} — {v.make}</option>)}</select></div>
        <div className="fb-field"><label>{t('serviceType2')}</label><select value={fStype} onChange={e=>setFStype(e.target.value)} style={{minWidth:150}}><option value="">{lang==='ar'?'كل الأنواع':'All Types'}</option>{SVC_TYPES.map(s=><option key={s} value={s}>{s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</option>)}</select></div>
        <div className="fb-field"><label>{lang==='ar'?'الاستعجال':'Urgency'}</label><select value={fUrgency} onChange={e=>setFUrgency(e.target.value)} style={{minWidth:140}}><option value="">{lang==='ar'?'الكل':'All'}</option><option value="overdue">🔴 {lang==='ar'?'متأخر':'Overdue'}</option><option value="due_soon">🟡 {lang==='ar'?'قريباً ≤30':'Due ≤30d'}</option><option value="ok">🟢 {lang==='ar'?'بخير':'OK (&gt;30d)'}</option></select></div>
        <div className="fb-field"><label>{lang==='ar'?'تاريخ الاستحقاق من':'Due Date From'}</label><input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)}/></div>
        <div className="fb-field"><label>{lang==='ar'?'تاريخ الاستحقاق إلى':'Due Date To'}</label><input type="date" value={fTo} onChange={e=>setFTo(e.target.value)}/></div>
        {hasFilter&&<button className="filter-reset" onClick={()=>{setFVeh('');setFStype('');setFFrom('');setFTo('');setFUrgency('');}}>✕ {t('reset')}</button>}
      </div>
      {(()=>{
        const allM=maintenance.filter(m=>!fVeh||m.vehicle_id===fVeh);
        const mActive=allM.filter(m=>m.status!=='completed'&&!(m.next_due_date&&new Date(m.next_due_date)<new Date())).length;
        const mOverdue=allM.filter(m=>m.status!=='completed'&&m.next_due_date&&new Date(m.next_due_date)<new Date()).length;
        const mCompleted=allM.filter(m=>m.status==='completed').length;
        const mCost=allM.reduce((s,m)=>s+Number(m.cost||0),0);
        return (
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:16}}>
            <div className="scard" style={{textAlign:'center',padding:'24px 14px'}}>
              <div style={{fontSize:38,marginBottom:10}}>🟢</div>
              <div style={{fontSize:30,fontWeight:800,color:'#059669'}}>{mActive}</div>
              <div style={{fontSize:12,color:'#64748b',marginTop:3,fontWeight:600}}>{t('active')}</div>
            </div>
            <div className="scard" style={{textAlign:'center',padding:'24px 14px'}}>
              <div style={{fontSize:38,marginBottom:10}}>🔴</div>
              <div style={{fontSize:30,fontWeight:800,color:'#dc2626'}}>{mOverdue}</div>
              <div style={{fontSize:12,color:'#64748b',marginTop:3,fontWeight:600}}>{t('overdue')}</div>
            </div>
            <div className="scard" style={{textAlign:'center',padding:'24px 14px'}}>
              <div style={{fontSize:38,marginBottom:10}}>✅</div>
              <div style={{fontSize:30,fontWeight:800,color:'#7c3aed'}}>{mCompleted}</div>
              <div style={{fontSize:12,color:'#64748b',marginTop:3,fontWeight:600}}>{t('completed')}</div>
            </div>
            <div className="scard" style={{textAlign:'center',padding:'24px 14px'}}>
              <div style={{fontSize:38,marginBottom:10}}>🔧</div>
              <div style={{fontSize:30,fontWeight:800,color:'#f59e0b'}}>{allM.length}</div>
