              {trips.length>0&&<button onClick={()=>{saveTrips([]);setTrips([]);}} style={{fontSize:11,color:'#ef4444',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:7,padding:'5px 10px',cursor:'pointer',fontWeight:700}}>{lang==='ar'?'مسح السجل':'Clear Log'}</button>}
            </div>
            {trips.length===0&&<div className="empty"><span className="ei">📋</span><div>{lang==='ar'?'لا توجد أحداث بعد. سيتم التسجيل عند دخول أو خروج مركبة من منطقة جغرافية':'No events yet. Events are logged when vehicles enter or exit geofence zones.'}</div></div>}
            {trips.length>0&&(
              <div className="card" style={{overflow:'hidden'}}>
                <table>
                  <thead><tr>
                    <th>{t('vehicles')}</th>
                    <th>{lang==='ar'?'المنطقة':'Zone'}</th>
                    <th>{lang==='ar'?'الحدث':'Event'}</th>
                    <th>{lang==='ar'?'الوقت':'Time'}</th>
                    <th>{lang==='ar'?'الإحداثيات':'Coordinates'}</th>
                  </tr></thead>
                  <tbody>{trips.slice(0,100).map(ev=>(
                    <tr key={ev.id}>
                      <td style={{fontWeight:700,color:'#2563eb'}}>{ev.vehicle_name}</td>
                      <td style={{color:'#475569'}}>{ev.geofence_name}</td>
                      <td><span style={{background:ev.event==='entered'?'#f0fdf4':'#fef2f2',color:ev.event==='entered'?'#16a34a':'#dc2626',border:'1px solid '+(ev.event==='entered'?'#bbf7d0':'#fecaca'),borderRadius:20,padding:'2px 9px',fontSize:11,fontWeight:700}}>{ev.event==='entered'?(lang==='ar'?'دخل':'Entered'):(lang==='ar'?'خرج':'Exited')}</span></td>
                      <td style={{color:'#64748b',fontSize:12}}>{new Date(ev.timestamp).toLocaleString(lang==='ar'?'ar-KW':'en-US')}</td>
                      <td style={{fontSize:11,color:'#94a3b8',fontFamily:'monospace'}}>{ev.lat?.toFixed(4)}, {ev.lng?.toFixed(4)}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── Sensor Setup Modal ── */}
      {setupModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.6)',backdropFilter:'blur(4px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:520,maxHeight:'90vh',overflow:'auto',boxShadow:'0 32px 80px rgba(0,0,0,.38)'}}>
            {/* Modal header */}
            <div style={{padding:'20px 24px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
              <div>
                <div style={{fontWeight:900,fontSize:16,color:'#0f172a',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:22}}>📡</span> Sensor Setup
                </div>
                <div style={{fontSize:13,color:'#2563eb',fontWeight:700,marginTop:3}}>{setupModal.plate||setupModal.name}</div>
                <div style={{fontSize:12,color:'#64748b',marginTop:1}}>{[setupModal.make,setupModal.model,setupModal.year].filter(Boolean).join(' ')}</div>
              </div>
              <button onClick={()=>setSetupModal(null)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#94a3b8',padding:'2px 6px'}}>✕</button>
            </div>
            {/* Form */}
            <div style={{padding:'20px 24px'}}>
              {formErr&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#b91c1c',marginBottom:14}}>{formErr}</div>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5,textTransform:'uppercase',letterSpacing:'.04em'}}>IMEI Number <span style={{color:'#ef4444'}}>*</span></label>
                  <input value={sensorForm.imei} onChange={e=>setSensorForm(f=>({...f,imei:e.target.value}))} placeholder="e.g. 352656108562384"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5,textTransform:'uppercase',letterSpacing:'.04em'}}>Serial Number</label>
                  <input value={sensorForm.serial} onChange={e=>setSensorForm(f=>({...f,serial:e.target.value}))} placeholder="e.g. TLT-4527881"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5,textTransform:'uppercase',letterSpacing:'.04em'}}>Device Model</label>
                  <select value={sensorForm.model} onChange={e=>setSensorForm(f=>({...f,model:e.target.value}))}
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,background:'#fff',boxSizing:'border-box'}}>
                    {SENSOR_MODELS.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5,textTransform:'uppercase',letterSpacing:'.04em'}}>Installation Date</label>
                  <input type="date" value={sensorForm.installed_at} onChange={e=>setSensorForm(f=>({...f,installed_at:e.target.value}))}
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                </div>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5,textTransform:'uppercase',letterSpacing:'.04em'}}>Installer / Technician</label>
                  <input value={sensorForm.installer} onChange={e=>setSensorForm(f=>({...f,installer:e.target.value}))} placeholder="Name or company who installed the device"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                </div>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={{display:'block',fontSize:11,fontWeight:700,color:'#64748b',marginBottom:5,textTransform:'uppercase',letterSpacing:'.04em'}}>Notes</label>
                  <textarea value={sensorForm.notes} onChange={e=>setSensorForm(f=>({...f,notes:e.target.value}))} rows={2}
                    placeholder="Any notes about the installation or device configuration…"
                    style={{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,resize:'vertical',boxSizing:'border-box'}}/>
                </div>
              </div>
              {/* Setup guide */}
              <div style={{marginTop:16,background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:12,padding:'14px 16px'}}>
                <div style={{fontWeight:800,fontSize:11,color:'#0369a1',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>📡 Device Connection Guide</div>
                <div style={{fontSize:12,color:'#0c4a6e',lineHeight:1.8}}>
                  <b>1.</b> Install GPS device in vehicle OBD port or wire to ignition power<br/>
                  <b>2.</b> Insert a data-enabled SIM card (any local carrier)<br/>
                  <b>3.</b> Configure server APN settings on device via SMS or portal<br/>
                  <b>4.</b> Enter the IMEI above — device will link automatically<br/>
                  <b>5.</b> Live position updates every 10–30 seconds once active
                </div>
              </div>
            </div>
            <div style={{padding:'14px 24px',borderTop:'1px solid #f1f5f9',display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={()=>setSetupModal(null)} style={{padding:'9px 22px',border:'1px solid #e2e8f0',borderRadius:8,background:'#fff',color:'#475569',fontWeight:700,fontSize:13,cursor:'pointer'}}>Cancel</button>
              <button onClick={saveSensor}
                style={{padding:'9px 22px',background:'linear-gradient(135deg,#2563eb,#1d4ed8)',color:'#fff',border:'none',borderRadius:8,fontWeight:700,fontSize:13,cursor:'pointer',opacity:sensorForm.imei.trim()?1:.55}}>
                💾 Save & Activate
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [currentUser,setCU]=useState(getSession);
  const [authPage,setAuthPage]=useState('login'); // login only — marketplace removed
  const [regPlan,setRegPlan]=useState('trial');
  const VALID_PAGES=['dashboard','vehicles','drivers','maintenance','workorders','fuel','reports','documents','tracking','settings'];
  const [page,setPage]=useState(()=>{const h=window.location.hash.slice(1);return VALID_PAGES.includes(h)?h:'dashboard';});
  const [vehicles,setV]=useState([]);
  const [drivers,setD]=useState([]);
  const [maintenance,setM]=useState([]);
  const [workorders,setW]=useState([]);
  const [fuel,setF]=useState([]);
  const [syncStatus,setSyncStatus]=useState('offline'); /* offline | synced | error */
  const [showWelcome,setShowWelcome]=useState(false);
  const [showFBSetup,setShowFBSetup]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [lang,setLang]=useState(()=>localStorage.getItem('sw3_lang')||'en');
  function toggleLang(){
    const next=lang==='en'?'ar':'en';
    setLang(next);
    localStorage.setItem('sw3_lang',next);
    document.body.dir=next==='ar'?'rtl':'ltr';
    document.body.style.fontFamily=next==='ar'?"'Noto Sans Arabic','Segoe UI',sans-serif":"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  }
  useEffect(()=>{
    document.body.dir=lang==='ar'?'rtl':'ltr';
    document.body.style.fontFamily=lang==='ar'?"'Noto Sans Arabic','Segoe UI',sans-serif":"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";
  },[lang]);

  useEffect(()=>{
    runMigrations();
    checkSubscriptions(); // auto-suspend expired companies on every app load
    checkRenewalReminders(); // send 7-day renewal reminders
    seedData();
    setV(loadLS('v')||[]);
    setD(loadLS('d')||[]);
    setM(loadLS('m')||[]);
    setW(loadLS('w')||[]);
    setF(loadLS('f')||[]);
    function startSync(fbCfg){
      const ok=initFirebase(fbCfg);
      if(ok){
        saveFBConfig(fbCfg); // persist to localStorage for next load
        // Monitor real connection state — Firebase may initialise but network can be blocked
        _db.ref('.info/connected').on('value',snap=>{
          setSyncStatus(snap.val()===true?'synced':'error');
        });
        const syncKey=(lsKey,setter)=>{
          fbListen(lsKey,val=>{
            const arr=fbValToArr(val);
            setter(arr);
            localStorage.setItem(lsKey,JSON.stringify(arr));
          },()=>{
            const local=JSON.parse(localStorage.getItem(lsKey)||'[]');
            if(local.length)fbSet(lsKey,local);
          });
        };
        syncKey('sw3_v',setV);
        syncKey('sw3_d',setD);
        syncKey('sw3_m',setM);
        syncKey('sw3_w',setW);
        syncKey('sw3_f',setF);
        fbListen('sw3_u',val=>{
          const arr=fbValToArr(val);
          if(arr.length)localStorage.setItem('sw3_u',JSON.stringify(arr));
        },()=>{
          const local=loadUsers();
          if(local.length)fbSet('sw3_u',local);
        });
      }else{setSyncStatus('error');}
    }
    // Try to load config from firebase-config.json file first (auto-sync on any device)
    fetch('./firebase-config.json')
      .then(r=>r.ok?r.json():Promise.reject())
      .then(cfg=>{if(cfg&&cfg.apiKey&&cfg.databaseURL){startSync(cfg);}else{throw new Error('invalid');}})
      .catch(()=>{
        // Fall back to localStorage config (manually set up via modal)
        const fbCfg=getFBConfig();
        if(fbCfg)startSync(fbCfg);
      });
    return()=>{ ['sw3_v','sw3_d','sw3_m','sw3_w','sw3_f','sw3_u'].forEach(fbOff); };
  },[]);

  useEffect(()=>{ window.location.hash=page; },[page]);

  function navigate(p){setPage(p);setSidebarOpen(false);}
  function handleLogin(sess){setCU(sess);}
  function handleLogout(){addLog(currentUser,'Logout','System','Signed out');clearSession();window.location.href=window.location.href.split('#')[0];}

  // ── Company-scoped data isolation ──────────────────────
  const isPlatAdmin=currentUser&&currentUser.role==='platform_admin';
  const cid=currentUser?currentUser.company_id||'':'';
  // For platform_admin: load fresh company_ids from localStorage so changes in Settings take effect immediately
  const _liveAdmin=isPlatAdmin?(loadUsers().find(u=>u.id===currentUser.id)||null):null;
  // Use fresh company_id from localStorage (NOT the stale session cid) so removals take effect immediately
  const _liveAdminCid=_liveAdmin?.company_id||'';
  const myCompanyIds=isPlatAdmin
    ?(_liveAdmin?.company_ids?.length?_liveAdmin.company_ids:(_liveAdminCid?[_liveAdminCid]:[]))
    :(cid?[cid]:[]);
  // Filter: everyone sees only records belonging to their assigned companies
  // If company is suspended (non-platAdmin), return empty arrays so no data leaks through
  const _liveCo=(!isPlatAdmin&&cid)?loadCompanies().find(c=>c.id===cid)||null:null;
  // For platform_admin: resolve names of all assigned companies for sidebar display
  const _adminCompanies=isPlatAdmin&&myCompanyIds.length?loadCompanies().filter(c=>myCompanyIds.includes(c.id)):[];
  const companySuspended=!isPlatAdmin&&_liveCo?.status==='suspended';
  const isTM=currentUser&&currentUser.role==='transportation_manager';
  const isLM=currentUser&&currentUser.role==='logistics_manager';
  // Vehicle types each scoped role can see
  const TM_VEH_TYPES=['bus','car'];
  const LM_VEH_TYPES=['truck','van','equipment','other'];
  // Roles that always see ALL data regardless of created_by
  // Roles that always see ALL data regardless of created_by
  const canViewAllData=['platform_admin','company_admin','executive'].includes(currentUser?.role);
  // TM sees only their own records; others see all
  function tmFilter(arr){ if(canViewAllData) return arr; return isTM?arr.filter(r=>r.created_by===currentUser.id):arr; }
  // Filter vehicles by type scope for TM (bus/car) and LM (truck/van/equipment/other)
  function vehTypeFilter(arr){ if(isTM) return arr.filter(v=>TM_VEH_TYPES.includes(v.type)); if(isLM) return arr.filter(v=>LM_VEH_TYPES.includes(v.type)); return arr; }
  // Base company filter — PA with no companies assigned sees ALL data
  function companyFilter(arr){
    if(isPlatAdmin&&!myCompanyIds.length) return arr; // PA sees everything when no company assigned
    return arr.filter(r=>myCompanyIds.length?myCompanyIds.includes(r.company_id):!r.company_id);
  }
  const myVehicles=companySuspended?[]:vehTypeFilter(tmFilter(companyFilter(vehicles)));
  // For TM/LM: restrict related data to only their allowed vehicle types
  // PA/CA/Executive: _allowedVids is null → no vehicle type restriction → see ALL roles' data
  const _allowedVids=(isTM||isLM)?new Set(myVehicles.map(v=>v.id)):null;
  function vehicleScopeFilter(arr,vidField='vehicle_id'){
    if(!_allowedVids) return arr; // PA, CA, Executive see all data from all roles
    return arr.filter(r=>!r[vidField]||_allowedVids.has(r[vidField]));
  }
  const myDrivers=companySuspended?[]:(!_allowedVids
    ? tmFilter(companyFilter(drivers))
    : tmFilter(companyFilter(drivers)).filter(d=>{
        const vids=drvVehicleIds(d);
        return !vids.length||vids.some(vid=>_allowedVids.has(vid));
      }));
  const myMaint=companySuspended?[]:vehicleScopeFilter(tmFilter(companyFilter(maintenance)));
  const myWO=companySuspended?[]:vehicleScopeFilter(tmFilter(companyFilter(workorders)));
  const myFuel=companySuspended?[]:vehicleScopeFilter(tmFilter(companyFilter(fuel)));

  // Scoped setters — FIXED: preserve ALL records outside current user's visible scope
  // currentVisible = what the user currently sees (myVehicles, myFuel, etc.)
  // others = everything in fullArr that user CANNOT see → always preserved
  // withCid = user's new list (after add/edit/delete) → replaces only what user can see
  function makeScopedSetter(fullArr,setFull,lsKey,currentVisible){
    return function(newArr){
      const withCid=newArr.map(r=>r.company_id?r:{...r,company_id:cid});
      // Build set of IDs the user currently sees — only these can be replaced
      const visibleIds=new Set((currentVisible||[]).map(r=>r.id));
      // others = every record NOT currently visible to this user → NEVER wiped
      const others=fullArr.filter(r=>!visibleIds.has(r.id));
      const merged=[...others,...withCid];
      setFull(merged);
      saveLS(lsKey,merged);
    };
  }
  // Pass current visible arrays so each role only replaces what they can see
  function setVehicles(d){makeScopedSetter(vehicles,setV,'v',myVehicles)(d);}
  function setDrivers(d){makeScopedSetter(drivers,setD,'d',myDrivers)(d);}
  function setMaintenance(d){makeScopedSetter(maintenance,setM,'m',myMaint)(d);}
  function setWorkorders(d){makeScopedSetter(workorders,setW,'w',myWO)(d);}
  function setFuel(d){makeScopedSetter(fuel,setF,'f',myFuel)(d);}
  function handleFBConnected(){setShowFBSetup(false);window.location.reload();}
  function handleDisconnectFB(){clearFBConfig();setSyncStatus('offline');window.location.reload();}

  // ── MUST be before any conditional return (React hooks rules) ──
  useEffect(()=>{
    if(currentUser&&currentUser.role!=='pending'){
      const has=getUnreadNotifs(currentUser.id).some(n=>n.type==='activation');
      if(has){setShowWelcome(true);markNotifsRead(currentUser.id);}
    }
  },[currentUser&&currentUser.id]);

  if(!currentUser){
    // Marketplace removed — go straight to login
    return <LoginPage onLogin={handleLogin} onRegister={null} onLanding={null}/>;
  }

  // Suspended user screen: account suspended while user was logged in
  const liveUserRecord=loadUsers().find(u=>u.id===currentUser.id)||null;
  if(liveUserRecord&&liveUserRecord.user_status==='suspended'&&!isPlatAdmin){
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#0f172a,#1e293b)'}}>
        <div style={{background:'#fff',borderRadius:24,padding:'40px 36px',maxWidth:460,width:'100%',textAlign:'center',boxShadow:'0 32px 80px rgba(0,0,0,.45)'}}>
          <div style={{fontSize:56,marginBottom:14}}>🚫</div>
          <h2 style={{fontWeight:900,fontSize:22,color:'#0f172a',margin:'0 0 10px'}}>Account Suspended</h2>
          <p style={{fontSize:14,color:'#64748b',lineHeight:1.7,margin:'0 0 16px'}}>
            Your account has been suspended by your company admin. Please contact them to restore your access.
          </p>
          <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:12,padding:'12px 16px',marginBottom:20,fontSize:13,color:'#b91c1c',textAlign:'left'}}>
            🚫 You cannot access any fleet data or features while your account is suspended.
          </div>
          <button className="btn btn-gray" style={{width:'100%',padding:'11px',fontSize:14}} onClick={()=>{clearSession();setCU(null);setAuthPage('login');}}>Sign Out</button>
        </div>
      </div>
    );
  }

  // Suspended company screen: company was suspended while user was already logged in
  const liveCompany=loadCompanies().find(c=>c.id===cid)||null;
  if(liveCompany&&liveCompany.status==='suspended'&&!isPlatAdmin){
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#0f172a,#1e293b)'}}>
        <div style={{background:'#fff',borderRadius:24,padding:'40px 36px',maxWidth:460,width:'100%',textAlign:'center',boxShadow:'0 32px 80px rgba(0,0,0,.45)'}}>
          <div style={{fontSize:56,marginBottom:14}}>🔒</div>
          <h2 style={{fontWeight:900,fontSize:22,color:'#0f172a',margin:'0 0 10px'}}>Account Suspended</h2>
          <p style={{fontSize:14,color:'#64748b',lineHeight:1.7,margin:'0 0 16px'}}>
            The company <strong style={{color:'#0f172a'}}>{liveCompany.name}</strong> has been suspended by the Platform Admin. Your access to fleet data has been paused.
          </p>
          <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:12,padding:'12px 16px',marginBottom:20,fontSize:13,color:'#b91c1c',textAlign:'left'}}>
            🚫 All company data is inaccessible while the account is suspended. Contact Platform Admin to restore access.
          </div>
          <button className="btn btn-gray" style={{width:'100%',padding:'11px',fontSize:14}} onClick={()=>{clearSession();setCU(null);setAuthPage('login');}}>Sign Out</button>
        </div>
      </div>
    );
  }

  // Pending-role screen: user logged in but has no assigned role yet
  if(currentUser.role==='pending'){
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#0f172a,#1e293b)'}}>
        <div style={{background:'#fff',borderRadius:24,padding:'40px 36px',maxWidth:440,width:'100%',textAlign:'center',boxShadow:'0 32px 80px rgba(0,0,0,.45)'}}>
          <div style={{fontSize:56,marginBottom:14}}>⏳</div>
          <h2 style={{fontWeight:900,fontSize:20,color:'#0f172a',margin:'0 0 10px'}}>Awaiting Activation</h2>
          <p style={{fontSize:14,color:'#64748b',lineHeight:1.7,margin:'0 0 20px'}}>
            Hi <strong>{currentUser.name}</strong>! Your account is registered and pending role assignment by the <strong>Platform Admin</strong>.
          </p>
          <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:'12px 16px',marginBottom:20,fontSize:13,color:'#78350f',textAlign:'left'}}>
            💡 Once the Platform Admin assigns your role, sign out and back in to access your fleet dashboard.
          </div>
          <button className="btn btn-gray" style={{width:'100%',padding:'11px',fontSize:14}} onClick={()=>{clearSession();setCU(null);setAuthPage('login');}}>Sign Out</button>
        </div>
      </div>
    );
  }

  const overdue=myMaint.filter(m=>m.next_due_date&&new Date(m.next_due_date)<new Date()).length;
  const openWO=myWO.filter(w=>w.status==='open'||w.status==='in_progress').length;
  const licAlert=myMaint.filter(m=>m.service_type==='documents'&&[m.truck_lic,m.food_lic,m.sign_lic].some(d=>d&&daysLeft(d)!==null&&daysLeft(d)<=60)).length;
  const company=loadCompanies().find(c=>c.id===cid)||null;
  const curPlanData={plan:company?.plan||'starter'};
  const curPlan=PLANS[curPlanData.plan]||PLANS.starter;
  const roleColor=Object.fromEntries(Object.entries(ROLES).map(([k,v])=>[k,v.color]));
  const curNav=NAV.find(n=>n.id===page)||NAV[0];
  const syncDot=syncStatus==='synced'?'#10b981':syncStatus==='error'?'#ef4444':'#64748b';
  const syncLabel=syncStatus==='synced'?'☁️ Synced':syncStatus==='error'?'⚠️ Sync error':'⚪ Local only';

  return (
    <LangContext.Provider value={lang}>
    <div style={{display:'flex'}}>
      {/* Mobile header */}
      <div className="mob-hdr">
        <button onClick={()=>setSidebarOpen(o=>!o)} style={{background:'none',border:'none',color:'rgba(255,255,255,.8)',fontSize:22,cursor:'pointer',padding:'4px 6px',lineHeight:1}}>☰</button>
        <span style={{fontSize:20}}>{curNav.i}</span>
        <span style={{color:'#fff',fontWeight:700,fontSize:15,flex:1}}>{curNav.l}</span>
        {overdue>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:9999,fontSize:11,padding:'2px 8px',fontWeight:700}}>{overdue}!</span>}
      </div>
      {/* Sidebar overlay (mobile) */}
      <div className={'mob-overlay'+(sidebarOpen?' sb-open':'')} onClick={()=>setSidebarOpen(false)}/>
      {/* Sidebar */}
      <aside className={'sidebar'+(sidebarOpen?' sb-open':'')}>
        <div style={{padding:'18px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.08)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🚛</div>
            <div>
              <div style={{color:'#fff',fontWeight:800,fontSize:14,lineHeight:1.2}}>SWiSH FLEET</div>
              <div style={{color:'rgba(255,255,255,.3)',fontSize:10}}>Fleet Management System</div>
            </div>
          </div>
        </div>
        <nav style={{flex:1,padding:'8px 6px',overflowY:'auto'}}>
          {NAV.filter(item=>item.id==='settings'?canAccess(currentUser.role,'settings','view'):canAccess(currentUser.role,item.id,'view')).map(item=>{
            const active=page===item.id;
            const navLabel=T[lang]?.[item.id]||item.l;
            return (
              <button key={item.id} onClick={()=>navigate(item.id)} style={{width:'100%',textAlign:lang==='ar'?'right':'left',padding:'10px 12px',borderRadius:10,display:'flex',alignItems:'center',gap:10,background:active?'linear-gradient(135deg,rgba(59,130,246,.9),rgba(37,99,235,.9))':'transparent',color:active?'#fff':'rgba(255,255,255,.5)',border:'none',cursor:'pointer',fontSize:13,fontWeight:active?700:500,marginBottom:2,transition:'all .18s',position:'relative',boxShadow:active?'0 2px 12px rgba(37,99,235,.35)':'none'}}>
                <span style={{fontSize:16}}>{item.i}</span>
                <span style={{flex:1}}>{navLabel}</span>
                {item.id==='maintenance'&&overdue>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:9999,fontSize:10,padding:'2px 7px',fontWeight:800}}>{overdue}</span>}
                {item.id==='workorders'&&openWO>0&&<span style={{background:'#3b82f6',color:'#fff',borderRadius:9999,fontSize:10,padding:'2px 7px',fontWeight:800}}>{openWO}</span>}
                {item.id==='reports'&&licAlert>0&&<span style={{background:'#f59e0b',color:'#fff',borderRadius:9999,fontSize:10,padding:'2px 7px',fontWeight:800}}>⚠</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,.08)',flexShrink:0}}>
          {/* Sync status indicator */}
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,padding:'5px 8px',borderRadius:7,background:'rgba(255,255,255,.04)'}}>
            <span style={{width:7,height:7,borderRadius:9999,background:syncStatus==='synced'?'#10b981':syncStatus==='error'?'#ef4444':'#64748b',flexShrink:0,display:'inline-block',boxShadow:syncStatus==='synced'?'0 0 6px #10b981':'none'}}/>
            <span style={{color:'rgba(255,255,255,.35)',fontSize:10,fontWeight:600,flex:1}}>
              {syncStatus==='synced'?'Cloud synced':syncStatus==='error'?'⚠ Sync blocked — use personal WiFi':'Not synced'}
            </span>
          </div>
          {/* User info */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
            <div style={{width:30,height:30,borderRadius:9999,background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{(ROLES[currentUser.role]||{}).icon||'👤'}</div>
            <div style={{overflow:'hidden',flex:1}}>
              <div style={{color:'#fff',fontWeight:700,fontSize:12,textOverflow:'ellipsis',overflow:'hidden',whiteSpace:'nowrap'}}>{currentUser.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span style={{width:5,height:5,borderRadius:9999,background:roleColor[currentUser.role]||'#64748b',display:'inline-block'}}/>
                <span style={{color:'rgba(255,255,255,.3)',fontSize:10}}>{(ROLES[currentUser.role]||{}).label||currentUser.role}</span>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <button onClick={toggleLang} className="lang-btn" style={{flex:1,textAlign:'center'}}>
              {lang==='en'?'🌐 العربية':'🌐 English'}
            </button>
          </div>
          <button onClick={handleLogout} style={{width:'100%',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,color:'rgba(255,255,255,.45)',fontSize:11,padding:'6px',cursor:'pointer',fontWeight:600}}>{lang==='ar'?'تسجيل الخروج':'Sign Out'}</button>
        </div>
      </aside>
      <main className="main">
        {/* Marketplace banners removed — subscription system disabled */}
        {page==='dashboard'&&<Dashboard vehicles={myVehicles} drivers={myDrivers} maintenance={myMaint} workorders={myWO} fuel={myFuel}/>}
        {page==='vehicles'&&canAccess(currentUser.role,'vehicles')&&<Vehicles vehicles={myVehicles} setVehicles={setVehicles} currentUser={currentUser}/>}
        {page==='drivers'&&canAccess(currentUser.role,'drivers')&&<Drivers drivers={myDrivers} setDrivers={setDrivers} vehicles={myVehicles} currentUser={currentUser}/>}
        {page==='maintenance'&&canAccess(currentUser.role,'maintenance')&&<Maintenance maintenance={myMaint} setMaintenance={setMaintenance} vehicles={myVehicles} currentUser={currentUser}/>}
        {page==='workorders'&&canAccess(currentUser.role,'workorders')&&<WorkOrders workorders={myWO} setWorkorders={setWorkorders} vehicles={myVehicles} currentUser={currentUser}/>}
        {page==='fuel'&&canAccess(currentUser.role,'fuel')&&<FuelPage fuel={myFuel} setFuel={setFuel} vehicles={myVehicles} currentUser={currentUser}/>}
        {page==='reports'&&canAccess(currentUser.role,'reports')&&<Reports vehicles={myVehicles} drivers={myDrivers} maintenance={myMaint} workorders={myWO} fuel={myFuel} currentUser={currentUser}/>}
        {page==='documents'&&canAccess(currentUser.role,'documents')&&<VehicleDocuments vehicles={myVehicles} currentUser={currentUser}/>}
        {page==='tracking'&&canAccess(currentUser.role,'tracking')&&<LiveTracking vehicles={myVehicles} currentUser={currentUser}/>}
        {page==='settings'&&canAccess(currentUser.role,'settings')&&<Settings currentUser={currentUser}/>}
        {!canAccess(currentUser.role,page)&&page!=='dashboard'&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'60vh',color:'#94a3b8'}}>
            <div style={{fontSize:60,marginBottom:16}}>🔒</div>
            <div style={{fontSize:18,fontWeight:700,color:'#334155',marginBottom:6}}>{T[lang]?.noAccess||'Access Restricted'}</div>
            <div style={{fontSize:13}}>{lang==='ar'?'دورك':'Your role'} <strong>{(ROLES[currentUser.role]||{}).label||currentUser.role}</strong> {lang==='ar'?'لا يملك صلاحية عرض هذه الصفحة':'does not have permission to view this page.'}</div>
          </div>
        )}
      </main>
      {showFBSetup&&<FirebaseSetupModal onClose={()=>setShowFBSetup(false)} onConnected={handleFBConnected}/>}
    </div>
    </LangContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
