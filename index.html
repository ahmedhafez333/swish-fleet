const EW={vehicle_id:'',title:'',description:'',priority:'medium',status:'open',assigned_to:'',cost:'',resolution:'',image:''};
function WorkOrders({workorders,setWorkorders,vehicles,currentUser}) {
  const lang=useLang(); const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const [show,setShow]=useState(false);
  const [form,setForm]=useState(EW);
  const [editId,setEditId]=useState(null);
  const [imgLoading,setImgLoading]=useState(false);
  const [imgPrev,setImgPrev]=useState('');
  const [woErr,setWOErr]=useState('');
  const [fVeh,setFVeh]=useState('');
  const [fAssigned,setFAssigned]=useState('');
  const [fFrom,setFFrom]=useState('');
  const [fTo,setFTo]=useState('');
  const [fPriority,setFPriority]=useState('');
  const [fStatus,setFStatus]=useState('');
  const [showHistory,setShowHistory]=useState(false);
  const fileRef=useRef();
  const set=f=>val=>setForm(p=>({...p,[f]:val}));
  function openEdit(w){setForm({...EW,...w});setEditId(w.id);setImgPrev(w.image||'');setWOErr('');setShow(true);}
  function saveWO(){
    if(!form.vehicle_id){setWOErr(lang==='ar'?'يرجى اختيار مركبة — هذا الحقل إلزامي.':'Vehicle is required. Please select a vehicle before saving.');return;}
    setWOErr('');
    const isNew=!editId;const today=todayStr();const saved=isNew?{...form,image:imgPrev,id:uid(),created_at:nowISO(),created_by:currentUser.id,date:today}:{...workorders.find(w=>w.id===editId),...form,image:imgPrev,date:today};setWorkorders(isNew?[...workorders,saved]:workorders.map(w=>w.id===editId?saved:w));addLog(currentUser,isNew?'Add':'Edit','Work Order',form.title+' ['+form.priority+']');setShow(false);setImgPrev('');
  }
  function del(id){if(!confirm('Delete?'))return;const w=workorders.find(x=>x.id===id);setWorkorders(workorders.filter(w=>w.id!==id));addLog(currentUser,'Delete','Work Order',w?w.title:'');}
  async function handleImg(e){
    const file=e.target.files[0]; if(!file) return;
    setImgLoading(true);
    const c=await compressImg(file);
    setImgPrev(c);
    const h=analyzeImg(file.name);
    if(h) setForm(f=>({...f,title:h.title,priority:h.priority}));
    setImgLoading(false);
  }
  const assignees=[...new Set(workorders.map(w=>w.assigned_to).filter(Boolean))];
  const hasFilter=fVeh||fAssigned||fFrom||fTo||fPriority||fStatus;
  function applyBaseFilters(w){
    if(fVeh&&w.vehicle_id!==fVeh) return false;
    if(fAssigned&&w.assigned_to!==fAssigned) return false;
    const d=w.date||(w.created_at||'').slice(0,10);
    if(fFrom&&d&&d<fFrom) return false;
    if(fTo&&d&&d>fTo) return false;
    return true;
  }
  const filtered=workorders.filter(w=>{
    if(w.status==='closed') return false;
    if(!applyBaseFilters(w)) return false;
    if(fPriority&&w.priority!==fPriority) return false;
    if(fStatus&&w.status!==fStatus) return false;
    return true;
  });
  const closedWOs=workorders.filter(w=>w.status==='closed'&&applyBaseFilters(w));
  const totalCost=filtered.reduce((s,w)=>s+Number(w.cost||0),0);
  const allActiveCost=workorders.filter(w=>w.status!=='closed').reduce((s,w)=>s+Number(w.cost||0),0);
  return (
    <div className="p-6">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-icon" style={{background:'linear-gradient(135deg,#8b5cf622,#7c3aed22)'}}><span>📋</span></div>
          <div><h1 style={{fontSize:22,fontWeight:800,margin:0,color:'#0f172a'}}>{t('workorders')}</h1><p style={{color:'#64748b',fontSize:13,margin:0}}>{filtered.length} {lang==='ar'?'نشط':'active'} · <span style={{color:'#64748b'}}>{workorders.filter(w=>w.status==='closed').length} {lang==='ar'?'مغلق':'closed'}</span></p></div>
        </div>
        <button className="btn btn-blue" onClick={()=>{setForm(EW);setEditId(null);setImgPrev('');setShow(true);}}>＋ {t('addWOBtn')}</button>
      </div>
      <div className="filter-bar">
        <div className="fb-field"><label>{t('vehicle')}</label><select value={fVeh} onChange={e=>setFVeh(e.target.value)} style={{minWidth:150}}><option value="">{lang==='ar'?'كل المركبات':'All Vehicles'}</option>{vehicles.map(v=><option key={v.id} value={v.id}>{v.plate} — {v.make}</option>)}</select></div>
        <div className="fb-field"><label>{lang==='ar'?'الحالة':'Status'}</label><select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{minWidth:130}}><option value="">{lang==='ar'?'جميع النشطة':'All Active'}</option><option value="open">📂 {t('open')}</option><option value="in_progress">⚙️ {t('inProgress')}</option><option value="resolved">✅ {t('resolved')}</option></select></div>
        <div className="fb-field"><label>{lang==='ar'?'الأولوية':'Priority'}</label><select value={fPriority} onChange={e=>setFPriority(e.target.value)} style={{minWidth:120}}><option value="">{lang==='ar'?'كل الأولويات':'All Priorities'}</option><option value="low">🟢 Low</option><option value="medium">🟡 Medium</option><option value="high">🟠 High</option><option value="critical">🔴 Critical</option></select></div>
        <div className="fb-field"><label>{t('woAssigned')}</label><select value={fAssigned} onChange={e=>setFAssigned(e.target.value)} style={{minWidth:140}}><option value="">{lang==='ar'?'الكل':'All Assignees'}</option>{assignees.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
        <div className="fb-field"><label>{t('date')} {lang==='ar'?'من':'From'}</label><input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)}/></div>
        <div className="fb-field"><label>{t('date')} {lang==='ar'?'إلى':'To'}</label><input type="date" value={fTo} onChange={e=>setFTo(e.target.value)}/></div>
        {hasFilter&&<button className="filter-reset" onClick={()=>{setFVeh('');setFAssigned('');setFFrom('');setFTo('');setFPriority('');setFStatus('');}}>✕ {t('reset')}</button>}
      </div>

          <div key={s} className="scard" style={{textAlign:'center',padding:'24px 14px'}}>
            <div style={{fontSize:38,marginBottom:10}}>{ic}</div>

            <div style={{fontSize:12,color:'#64748b',textTransform:'capitalize',marginTop:3,fontWeight:600}}>{s==='open'?t('open'):s==='in_progress'?t('inProgress'):t('resolved')}</div>

        <div className="scard" style={{textAlign:'center',padding:'24px 14px',background:'linear-gradient(135deg,#f8fafc,#f1f5f9)',cursor:'pointer',border:showHistory?'2px solid #64748b':'2px solid transparent'}} onClick={()=>setShowHistory(p=>!p)}>
          <div style={{fontSize:38,marginBottom:10}}>📜</div>

const EF={vehicle_id:'',start_date:'',start_fuel:'',start_odo:'',recharged:'',end_date:'',end_fuel:'',end_odo:'',consumed_liters:'',fuel_type:'diesel',station:'',notes:''};
function FuelPage({fuel,setFuel,vehicles,currentUser}) {
  const lang=useLang(); const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const canImportExport=['platform_admin','company_admin','fleet_manager','transportation_manager','logistics_manager'].includes(currentUser.role);
  const [show,setShow]=useState(false);

  const [filterV,setFilterV]=useState('');
  const [fFrom,setFFrom]=useState('');
  const [fTo,setFTo]=useState('');
  const [fFuelType,setFFuelType]=useState('');
  const [showImport,setShowImport]=useState(false);
  const set=f=>val=>setForm(p=>({...p,[f]:val}));
  function recalc(f){
    const s=parseFloat(f.start_fuel||0);
    const r=parseFloat(f.recharged||0);
    const e=parseFloat(f.end_fuel||0);
    const c=s+r-e;
    const consumed=(s||r||e)?c.toFixed(3):'';
    return {...f,consumed_liters:consumed};
  }
  function handleSF(v){setForm(f=>recalc({...f,start_fuel:v}));}
  function handleEF(v){setForm(f=>recalc({...f,end_fuel:v}));}
  function handleRV(v){setForm(f=>recalc({...f,recharged:v}));}
  const [fuelErr,setFuelErr]=useState('');
  function saveFuel(){
    if(!form.vehicle_id){setFuelErr(lang==='ar'?'يرجى اختيار مركبة — هذا الحقل إلزامي.':'Vehicle is required. Please select a vehicle before saving.');return;}
    setFuelErr('');
    const isNew=!editId;const veh=vehicles.find(x=>x.id===form.vehicle_id);const saved=isNew?{...form,id:uid(),created_at:nowISO(),created_by:currentUser.id}:{...fuel.find(f=>f.id===editId),...form};setFuel(isNew?[...fuel,saved]:fuel.map(f=>f.id===editId?saved:f));addLog(currentUser,isNew?'Add':'Edit','Fuel Log',(veh?veh.plate+' ':'')+form.start_date+' → '+form.end_date);setShow(false);
  }
  function del(id){if(!confirm('Delete?'))return;const f=fuel.find(x=>x.id===id);const veh=f?vehicles.find(x=>x.id===f.vehicle_id):null;setFuel(fuel.filter(f=>f.id!==id));addLog(currentUser,'Delete','Fuel Log',veh?veh.plate:'');}
  function openEdit(f){setForm({...EF,...f});setEditId(f.id);setFuelErr('');setShow(true);}
  function handleImport(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=evt=>{
      const text=evt.target.result;
      const lines=text.trim().split(/\r?\n/);
      if(lines.length<2){alert('CSV must have a header row and at least one data row.');return;}
      const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
      const colMap={plate:'plate',vehicle_plate:'plate',start_date:'start_date',start_fuel:'start_fuel',start_fuel_kwd:'start_fuel',recharged:'recharged',recharged_kwd:'recharged',start_odo:'start_odo',end_date:'end_date',end_fuel:'end_fuel',end_fuel_kwd:'end_fuel',end_odo:'end_odo',consumed:'consumed_liters',consumed_liters:'consumed_liters',consumed_kwd:'consumed_liters',fuel_type:'fuel_type',station:'station',notes:'notes'};
      const imported=[];
      lines.slice(1).forEach(line=>{
        const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
        const row={};
        headers.forEach((h,i)=>{const k=colMap[h];if(k)row[k]=vals[i]||'';});
        if(!row.start_date&&!row.end_date) return;
        // match vehicle by plate
        const plate=(row.plate||'').toUpperCase();
        const veh=vehicles.find(v=>v.plate.toUpperCase()===plate);
        const s=parseFloat(row.start_fuel||0),r=parseFloat(row.recharged||0),en=parseFloat(row.end_fuel||0);
        const c=s+r-en;
        imported.push({...EF,...row,vehicle_id:veh?veh.id:'',consumed_liters:(s||r||en)?c.toFixed(3):(row.consumed_liters||''),id:uid(),created_at:nowISO()});
      });
      if(!imported.length){alert('No valid rows found. Make sure the CSV has start_date or end_date columns.');return;}
      setFuel([...fuel,...imported]);
      addLog(currentUser,'Import','Fuel Log',imported.length+' records imported');
      alert('✅ Imported '+imported.length+' fuel records.');
    };
    reader.readAsText(file);
    e.target.value='';
  }
  const hasFilter=filterV||fFrom||fTo||fFuelType;
  const filtered=(filterV?fuel.filter(f=>f.vehicle_id===filterV):fuel).filter(f=>{
    if(fFuelType&&f.fuel_type!==fFuelType) return false;

    if(fFrom&&d&&d<fFrom) return false;
    if(fTo&&d&&d>fTo) return false;
    return true;
  });
  const sumC=filtered.reduce((s,f)=>s+Number(f.consumed_liters||0),0);
  return (

                <div style={{position:'fixed',inset:0,zIndex:49}} onClick={()=>setShowImport(false)}/>
                <div style={{position:'absolute',right:0,top:'110%',background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:8,minWidth:210,zIndex:50,boxShadow:'0 8px 24px rgba(0,0,0,.12)'}}>
                  <div style={{fontSize:10,color:'#94a3b8',fontWeight:700,padding:'4px 8px 6px',textTransform:'uppercase',letterSpacing:'.06em'}}>Import Fuel CSV</div>
                  <button style={{width:'100%',textAlign:'left',padding:'9px 12px',background:'none',border:'none',cursor:'pointer',borderRadius:8,fontSize:13,color:'#374151',display:'flex',alignItems:'center',gap:8}} onMouseOver={e=>e.currentTarget.style.background='#f8fafc'} onMouseOut={e=>e.currentTarget.style.background='none'} onClick={()=>{
                    const h='plate,start_date,start_fuel,recharged,start_odo,end_date,end_fuel,end_odo,fuel_type,station,notes';
                    const ex='ABC-123,2026-04-01,10.500,5.000,12000,2026-04-30,8.000,14500,diesel,KNPC Station,Monthly fill\nDEF-456,2026-04-01,9.000,4.500,22000,2026-04-30,7.500,24200,diesel,Shell Station,';
                    const blob=new Blob([h+'\n'+ex],{type:'text/csv'});
                    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fuel_import_template.csv';a.click();
                  }}>📄 <span><strong style={{display:'block',fontSize:12}}>Download Template</strong><span style={{fontSize:11,color:'#94a3b8'}}>CSV with all required columns</span></span></button>
                  <label style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',cursor:'pointer',borderRadius:8,fontSize:13,color:'#374151'}} onMouseOver={e=>e.currentTarget.style.background='#f8fafc'} onMouseOut={e=>e.currentTarget.style.background='none'}>
                    📁 <span><strong style={{display:'block',fontSize:12}}>Upload & Import</strong><span style={{fontSize:11,color:'#94a3b8'}}>Select your filled template</span></span>

}

/* ═══════════════ ACTIVITY TAB ═══════════════ */

  const entities=[...new Set(allLogs.map(l=>l.entity).filter(Boolean))];
  const users=[...new Set(allLogs.map(l=>l.username).filter(Boolean))];
  const filtered=allLogs.filter(l=>(actFilter?l.username===actFilter:true)&&(actEntity?l.entity===actEntity:true));

            {users.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
          <select style={{width:170}} value={actEntity} onChange={e=>setActEntity(e.target.value)}>

        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          {[['Total Events',String(allLogs.length),'📝'],['Users Active',String(new Set(allLogs.map(l=>l.username)).size),'👤'],['Records Added',String(allLogs.filter(l=>l.action==='Add').length),'➕'],['Records Deleted',String(allLogs.filter(l=>l.action==='Delete').length),'🗑️']].map(([l,v,ic])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontSize:22}}>{ic}</div>
              <div style={{fontSize:22,fontWeight:800,color:'#0f172a'}}>{v}</div>
              <div style={{fontSize:11,color:'#64748b'}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card overflow-hidden">
        {filtered.length?(
          <table>
            <thead><tr><th>Timestamp</th><th>User</th><th>Role</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
            <tbody>{filtered.map(function(l,i){
              return (
                <tr key={i}>
                  <td style={{fontFamily:'monospace',fontSize:12,color:'#64748b',whiteSpace:'nowrap'}}>{fmtTS(l.timestamp)}</td>
                  <td><div style={{fontWeight:700}}>{l.user}</div><div style={{fontSize:11,color:'#94a3b8'}}>@{l.username}</div></td>
                  <td><span className="badge bg-gray-100 text-gray-500" style={{textTransform:'capitalize'}}>{l.role}</span></td>
                  <td><span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:9999,fontSize:11,fontWeight:700,background:(actionColor[l.action]||'#64748b')+'1a',color:actionColor[l.action]||'#64748b'}}>{l.action}</span></td>
                  <td style={{fontWeight:600}}>{l.entity}</td>
                  <td style={{fontSize:12,color:'#475569',maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.details}</td>
                </tr>
              );
            })}</tbody>
          </table>
        ):<div className="empty"><div className="ei">📝</div><div style={{fontWeight:600,marginBottom:4}}>No activity yet</div><div style={{fontSize:13}}>Events are logged when you add, edit, or delete records</div></div>}
      </div>
    </div>
  );
}

function Reports({vehicles,drivers,maintenance,workorders,fuel,currentUser}) {
  const lang=useLang(); const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const canImportExport=currentUser&&['platform_admin','company_admin','fleet_manager','transportation_manager','logistics_manager'].includes(currentUser.role);
  const [tab,setTab]=useState('fleet');
  const [fcPeriod,setFcPeriod]=useState(6);
  const [rVeh,setRVeh]=useState('');
  const [rDrv,setRDrv]=useState('');
  const [rFrom,setRFrom]=useState('');
  const [rTo,setRTo]=useState('');

  const hasRFilter=rVeh||rDrv||rFrom||rTo;

    if(rVeh&&w.vehicle_id!==rVeh) return false;
    if(rDrv&&w.assigned_to!==rDrv) return false;
    const d=w.date||(w.created_at||'').slice(0,10);
    if(rFrom&&d&&d<rFrom) return false;
    if(rTo&&d&&d>rTo) return false;

  });

    const d=m.last_service_date||m.next_due_date||'';
    if(rFrom&&d&&d<rFrom) return false;
    if(rTo&&d&&d>rTo) return false;
    return true;
  });
  const rFuel=fuel.filter(f=>{

  const rVehs=rVeh?vehicles.filter(v=>v.id===rVeh):vehicles;

  function rowDate(dt){
    if(!dt) return <span style={{color:'#94a3b8'}}>—</span>;
    const d=daysLeft(dt);
    const col=d<0?'#dc2626':d<=30?'#ea580c':'#16a34a';
    return <span style={{color:col,fontWeight:d<=30?700:400}}>{d<0?'❌ ':d<=30?'⚠️ ':'✅ '}{dt} ({d<0?'EXPIRED':d+'d'})</span>;
  }
  return (
    <div className="p-6">

                  <div style={{fontSize:30,marginBottom:8}}>📊</div>
                  <div style={{fontSize:17,fontWeight:800,color:'#9333ea'}}>{fuelEfficiency>0?fuelEfficiency.toFixed(1)+' km/KWD':'—'}</div>

            <span style={{fontSize:13,fontWeight:700,color:'#374151'}}>🔮 Forecast Period:</span>
            {[1,3,6,12].map(m=>(
              <button key={m} onClick={()=>setFcPeriod(m)} style={{padding:'6px 14px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,background:fcPeriod===m?'linear-gradient(135deg,#2563eb,#1d4ed8)':'#f1f5f9',color:fcPeriod===m?'#fff':'#374151'}}>{m}M</button>
            ))}
          </div>
          {(()=>{
            // ── helpers ──
            function monthlyAvgCost(records,costKey,dateKey){
              const valid=records.filter(r=>Number(r[costKey]||0)>0&&r[dateKey]);
              if(!valid.length) return 0;
              const earliest=valid.reduce((mn,r)=>r[dateKey]<mn?r[dateKey]:mn,valid[0][dateKey]);
              const months=Math.max(1,(new Date()-new Date(earliest))/(1000*60*60*24*30));
              return valid.reduce((s,r)=>s+Number(r[costKey]||0),0)/months;
            }
            const avgWOCost=monthlyAvgCost(workorders,'cost','created_at');
            const avgFuelCost=monthlyAvgCost(fuel,'consumed_liters','created_at');
            const avgMaintCost=monthlyAvgCost(maintenance,'cost','last_service_date');
            const fcWO=avgWOCost*fcPeriod;
            const fcFuel=avgFuelCost*fcPeriod;
            const fcMaint=avgMaintCost*fcPeriod;
            const fcTotal=fcWO+fcFuel+fcMaint;
            // ── upcoming maintenance in forecast window ──
            const fcEndDate=new Date();
            fcEndDate.setMonth(fcEndDate.getMonth()+fcPeriod);
            const upcomingMaint=maintenance.filter(m=>m.status!=='completed'&&m.next_due_date).sort((a,b)=>a.next_due_date.localeCompare(b.next_due_date));
            const inWindow=upcomingMaint.filter(m=>new Date(m.next_due_date)<=fcEndDate);
            const overdue=upcomingMaint.filter(m=>new Date(m.next_due_date)<new Date());
            // ── per-vehicle forecast ──
            const vehFcCost={};
            workorders.forEach(w=>{if(w.vehicle_id)vehFcCost[w.vehicle_id]=(vehFcCost[w.vehicle_id]||0)+Number(w.cost||0);});
            fuel.forEach(f=>{if(f.vehicle_id)vehFcCost[f.vehicle_id]=(vehFcCost[f.vehicle_id]||0)+Number(f.consumed_liters||0);});
            return (
              <>
                {/* Summary cards */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
                  {[['🔮','Total Forecast',fcTotal,'#1d4ed8','linear-gradient(135deg,#eff6ff,#dbeafe)'],['📋','Work Orders',fcWO,'#7c3aed','linear-gradient(135deg,#faf5ff,#ede9fe)'],['⛽','Fuel',fcFuel,'#059669','linear-gradient(135deg,#f0fdf4,#dcfce7)'],['🔧','Maintenance',fcMaint,'#d97706','linear-gradient(135deg,#fffbeb,#fef3c7)']].map(([ic,lbl,val,c,bg])=>(
                    <div key={lbl} className="scard" style={{textAlign:'center',padding:'20px 14px',background:bg}}>
                      <div style={{fontSize:32,marginBottom:8}}>{ic}</div>
                      <div style={{fontSize:17,fontWeight:800,color:c}}>{fmtKWD(val)}</div>
                      <div style={{fontSize:12,color:c,marginTop:4,fontWeight:600}}>{lbl}</div>
                      <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>Next {fcPeriod} month{fcPeriod>1?'s':''}</div>
                    </div>
                  ))}
                </div>
                {/* Monthly projection table */}
                <div className="card p-5" style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                    <div className="shdr" style={{margin:0}}>📅 Monthly Projection</div>
                    <span style={{fontSize:11,color:'#94a3b8'}}>Based on historical averages</span>
                  </div>
                  <table>
                    <thead><tr><th>Category</th><th>Monthly Avg (KWD)</th><th>{fcPeriod}-Month Forecast</th><th>Data Points</th></tr></thead>
                    <tbody>
                      <tr><td>📋 Work Orders</td><td style={{fontWeight:700,color:'#7c3aed'}}>{fmtKWD(avgWOCost)}</td><td style={{fontWeight:800,color:'#7c3aed'}}>{fmtKWD(fcWO)}</td><td style={{color:'#94a3b8'}}>{workorders.filter(w=>Number(w.cost||0)>0).length} orders</td></tr>
                      <tr><td>⛽ Fuel</td><td style={{fontWeight:700,color:'#059669'}}>{fmtKWD(avgFuelCost)}</td><td style={{fontWeight:800,color:'#059669'}}>{fmtKWD(fcFuel)}</td><td style={{color:'#94a3b8'}}>{fuel.filter(f=>Number(f.consumed_liters||0)>0).length} logs</td></tr>
                      <tr><td>🔧 Maintenance</td><td style={{fontWeight:700,color:'#d97706'}}>{fmtKWD(avgMaintCost)}</td><td style={{fontWeight:800,color:'#d97706'}}>{fmtKWD(fcMaint)}</td><td style={{color:'#94a3b8'}}>{maintenance.filter(m=>Number(m.cost||0)>0).length} records</td></tr>
                      <tr style={{background:'#f8fafc'}}><td style={{fontWeight:800}}>💰 Grand Total</td><td style={{fontWeight:800,color:'#1d4ed8'}}>{fmtKWD((avgWOCost+avgFuelCost+avgMaintCost))}</td><td style={{fontWeight:800,color:'#1d4ed8',fontSize:15}}>{fmtKWD(fcTotal)}</td><td/></tr>
                    </tbody>
                  </table>
                </div>
                {/* Upcoming maintenance schedule */}
                <div className="card overflow-hidden" style={{marginBottom:14}}>
                  <div style={{padding:'13px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontWeight:700}}>🔧 Maintenance Due in Next {fcPeriod} Month{fcPeriod>1?'s':''} ({inWindow.length} services)</span>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      {overdue.length>0&&<span style={{fontSize:12,fontWeight:700,color:'#dc2626',background:'#fef2f2',padding:'3px 10px',borderRadius:20}}>🚨 {overdue.length} overdue</span>}
                      {canImportExport&&<button className="btn btn-green" style={{fontSize:11,padding:'5px 12px'}} onClick={doExportForecast}>⬇️ Export</button>}
                    </div>
                  </div>
                  {inWindow.length?(
                    <table>
                      <thead><tr><th>Vehicle</th><th>Service Type</th><th>Next Due Date</th><th>Days</th><th>Interval</th><th>Est. Cost</th><th>Status</th></tr></thead>
                      <tbody>{inWindow.map(m=>{
                        const veh=vehicles.find(x=>x.id===m.vehicle_id);
                        const dl=daysLeft(m.next_due_date);
                        const ov=dl!==null&&dl<0;
                        const sn=dl!==null&&dl>=0&&dl<=14;
                        return (
                          <tr key={m.id}>
                            <td style={{fontFamily:'monospace',fontWeight:700,color:'#2563eb'}}>{veh?veh.plate:'—'}</td>
                            <td style={{textTransform:'capitalize'}}>{(m.service_type||'').replace(/_/g,' ')}</td>
                            <td style={{color:ov?'#dc2626':sn?'#ea580c':'#059669',fontWeight:700}}>{m.next_due_date}</td>
                            <td style={{fontWeight:700,color:ov?'#dc2626':sn?'#ea580c':'#374151'}}>{dl!==null?(ov?dl+'d':'+'+dl+'d'):'—'}</td>
                            <td style={{color:'#64748b'}}>{m.interval_days?m.interval_days+'d':m.interval_km?Number(m.interval_km).toLocaleString()+'km':'—'}</td>
                            <td style={{fontWeight:600,color:'#059669'}}>{m.cost?fmtKWD(m.cost):'—'}</td>
                            <td><Badge v={ov?'critical':sn?'high':'active'}/></td>
                          </tr>
                        );
                      })}</tbody>
                    </table>
                  ):<div className="empty" style={{padding:'28px'}}><div className="ei">🔧</div><div>No maintenance due within this period</div></div>}
                </div>
                {/* Fuel forecast per vehicle */}
                <div className="card p-5">
                  <div className="shdr">⛽ Fuel Forecast by Vehicle — Next {fcPeriod} Month{fcPeriod>1?'s':''}</div>
                  {vehicles.map(v=>{
                    const vLogs=fuel.filter(f=>f.vehicle_id===v.id&&Number(f.consumed_liters||0)>0);
                    if(!vLogs.length) return null;
                    const earliest=vLogs.reduce((mn,f)=>(f.created_at||'9')< mn?(f.created_at||'9'):mn,vLogs[0].created_at||'');
                    const months=Math.max(1,(new Date()-new Date(earliest||Date.now()))/(1000*60*60*24*30));
                    const avgV=vLogs.reduce((s,f)=>s+Number(f.consumed_liters||0),0)/months;
                    const fcV=avgV*fcPeriod;
                    const maxFc=Math.max(...vehicles.map(vx=>{const lg=fuel.filter(f=>f.vehicle_id===vx.id&&Number(f.consumed_liters||0)>0);if(!lg.length)return 0;const e=lg.reduce((mn,f)=>(f.created_at||'9')<mn?(f.created_at||'9'):mn,lg[0].created_at||'');const mo=Math.max(1,(new Date()-new Date(e||Date.now()))/(1000*60*60*24*30));return lg.reduce((s,f)=>s+Number(f.consumed_liters||0),0)/mo*fcPeriod;}),1);
                    const pct=Math.round(fcV/maxFc*100);
                    return (
                      <div key={v.id} style={{padding:'9px 0',borderBottom:'1px solid #f8fafc'}}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}>
                          <span style={{fontFamily:'monospace',fontWeight:700,color:'#2563eb'}}>{v.plate}</span>
                          <span><strong style={{color:'#059669'}}>{fmtKWD(fcV)}</strong> <span style={{color:'#94a3b8',fontSize:11}}>({fmtKWD(avgV)}/mo)</span></span>
                        </div>
                        <div style={{height:7,background:'#f1f5f9',borderRadius:4}}>
                          <div style={{height:7,background:'linear-gradient(90deg,#059669,#34d399)',borderRadius:4,width:pct+'%'}}/>
                        </div>
                      </div>
                    );
                  })}
                  {!fuel.length&&<div style={{color:'#94a3b8',fontSize:13}}>No fuel data to project from</div>}
                </div>
              </>
            );
          })()}
        </div>
      )}

      {tab==='activity'&&<ActivityTab doExportLogs={doExportLogs} canImportExport={canImportExport}/>}
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
/* ═══════════════ SETTINGS ═══════════════ */
function Settings({currentUser}){
  const lang=useLang(); const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const isPlatformAdmin=currentUser.role==='platform_admin';
  const isAdmin=canAccess(currentUser.role,'settings','full');
  const [tab,setTab]=useState('users'); // always start on users tab — marketplace tabs removed
  const [users,setUsersLocal]=useState(loadUsers);
  const [companies,setCompaniesLocal]=useState(loadCompanies);
  const [emailModal,setEmailModal]=useState(null); // {user, role, company}
  const [pendingRoles,setPendingRoles]=useState({}); // userId -> selected role for pending tab
  const [showAddUser,setShowAddUser]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [inlineEdit,setInlineEdit]=useState(null); // user id being inline-edited
  const [inlineRole,setInlineRole]=useState('');
  const [userForm,setUserForm]=useState({name:'',username:'',password:'',role:'driver'});
  const [userErr,setUserErr]=useState('');
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [deleteCompanyConfirm,setDeleteCompanyConfirm]=useState(null); // company obj
  const [companyUsersModal,setCompanyUsersModal]=useState(null); // company obj
  const [companyProfileModal,setCompanyProfileModal]=useState(null); // company obj
  const [companyProfileForm,setCompanyProfileForm]=useState({});
  const [companyUserForm,setCompanyUserForm]=useState({name:'',username:'',password:'',role:'driver',email:''});
  const [companyUserErr,setCompanyUserErr]=useState('');
  const [showAddCoUser,setShowAddCoUser]=useState(false);
  const [companyUserMode,setCompanyUserMode]=useState('existing'); // 'existing' | 'new'
  const [selectedExistingUserId,setSelectedExistingUserId]=useState('');

  function reloadUsers(){setUsersLocal(loadUsers());}
  function reloadCompanies(){setCompaniesLocal(loadCompanies());}

  // Inline role change
  function startInlineRole(u){setInlineEdit(u.id);setInlineRole(u.role==='pending'?'company_admin':u.role);}
  function saveInlineRole(u){
    const all=loadUsers();
    const co=companies.find(c=>c.id===u.company_id);
    saveUsers(all.map(x=>x.id===u.id?{...x,role:inlineRole}:x));
    // If activating from pending, also activate the company, stamp plan_started_at, and add notification
    if(u.role==='pending'){
      if(co) saveCompanies(loadCompanies().map(c=>c.id===co.id?{...c,status:'active',plan_started_at:c.plan_started_at||nowISO()}:c));
      addNotification(u.id,'activation','Your account has been activated as '+ROLES[inlineRole]?.label+'. You can now sign in to SWiSH FLEET.');
      reloadCompanies();
      setEmailModal({user:{...u,role:inlineRole},company:co});
    }
    reloadUsers();setInlineEdit(null);
  }
  // Assign role to pending user from pending tab
  function assignRole(u,role){
    const all=loadUsers();
    const co=companies.find(c=>c.id===u.company_id);
    saveUsers(all.map(x=>x.id===u.id?{...x,role}:x));
    if(co) saveCompanies(loadCompanies().map(c=>c.id===co.id?{...c,status:'active',plan_started_at:c.plan_started_at||nowISO()}:c));
    addNotification(u.id,'activation','Your account has been activated as '+ROLES[role]?.label+'. You can now sign in to SWiSH FLEET.');
    reloadUsers();reloadCompanies();
    setEmailModal({user:{...u,role},company:co});
  }

  function openAdd(){setUserForm({name:'',username:'',password:'',role:'driver'});setUserErr('');setEditUser(null);setShowAddUser(true);}
  function openEdit(u){setUserForm({name:u.name,username:u.username,password:'',role:u.role});setUserErr('');setEditUser(u);setShowAddUser(true);}
  function saveUser(){
    if(!userForm.name||!userForm.username){setUserErr('Name and username are required.');return;}
    const all=loadUsers();
    if(editUser){
      saveUsers(all.map(u=>u.id===editUser.id?{...u,name:userForm.name,username:userForm.username,role:userForm.role,...(userForm.password?{password:userForm.password}:{})}:u));
    } else {
      if(!userForm.password||userForm.password.length<4){setUserErr('Password must be at least 4 characters.');return;}
      if(all.find(u=>u.username===userForm.username)){setUserErr('Username already taken.');return;}
      const cid=currentUser.company_id||'';
      saveUsers([...all,{id:uid(),name:userForm.name,username:userForm.username,password:userForm.password,role:userForm.role,company_id:cid,created_at:nowISO()}]);
    }
    reloadUsers();setShowAddUser(false);
  }
  function deleteUser(u){
    saveUsers(loadUsers().filter(x=>x.id!==u.id));
    reloadUsers();setDeleteConfirm(null);
  }
  function toggleSuspendUser(u){
    const next=u.user_status==='suspended'?'active':'suspended';
    saveUsers(loadUsers().map(x=>x.id===u.id?{...x,user_status:next}:x));
    reloadUsers();
  }
  function updateCompanyStatus(cid,status){
    const all=loadCompanies();
    saveCompanies(all.map(c=>{
      if(c.id!==cid) return c;
      // When re-activating, stamp plan_started_at (fresh start)
      if(status==='active') return {...c,status,plan_started_at:nowISO(),suspended_reason:null,suspended_at:null};
      return {...c,status};
    }));
    reloadCompanies();
  }
  function deleteCompany(co){
    // Remove the company record
    saveCompanies(loadCompanies().filter(c=>c.id!==co.id));
    // Unassign all users that belonged to this company
    saveUsers(loadUsers().map(u=>{
      // For platform_admin: also remove this company from their company_ids array
      if(u.role==='platform_admin'){
        const newIds=(u.company_ids||[]).filter(id=>id!==co.id);
        const newPrimary=newIds.length>0?newIds[0]:(u.company_id===co.id?'':u.company_id);
        return {...u,company_ids:newIds,company_id:newPrimary};
      }
      return u.company_id===co.id?{...u,company_id:''}:u;
    }));
    reloadCompanies();reloadUsers();
    setDeleteCompanyConfirm(null);
  }
  // Company Profile modal helpers
  function openCompanyProfile(co){
    setCompanyProfileForm({name:co.name||'',industry:co.industry||'',country:co.country||'',city:co.city||'',phone:co.phone||'',size:co.size||'',plan:co.plan||'trial',status:co.status||'pending'});
    setCompanyProfileModal(co);
  }
  function saveCompanyProfile(){
    const all=loadCompanies();
    const existing=all.find(c=>c.id===companyProfileModal.id)||{};
    // If plan changed or status going active for first time, reset plan_started_at
    const planChanged=companyProfileForm.plan&&companyProfileForm.plan!==existing.plan;
    const goingActive=companyProfileForm.status==='active'&&existing.status!=='active';
    const newStarted=(planChanged||goingActive)?nowISO():existing.plan_started_at;
    saveCompanies(all.map(c=>c.id===companyProfileModal.id?{...c,...companyProfileForm,plan_started_at:newStarted,suspended_reason:(companyProfileForm.status==='active'?null:c.suspended_reason)}:c));
    reloadCompanies();
    setCompanyProfileModal(null);
  }
  // Company Users modal helpers
  function openCompanyUsers(co){setCompanyUserErr('');setCompanyUserForm({name:'',username:'',password:'',role:'driver',email:''});setShowAddCoUser(false);setCompanyUserMode('existing');setSelectedExistingUserId('');setCompanyUsersModal(co);}
  function assignExistingUser(){
    if(!selectedExistingUserId){setCompanyUserErr('Please select a user.');return;}
    const all=loadUsers();
    const target=all.find(u=>u.id===selectedExistingUserId);
    if(!target) return;
    let updated;
    if(target.role==='platform_admin'){
      // Platform admin: add to company_ids array (multi-company), keep or set primary company_id
      const existing=target.company_ids||[];
      if(!existing.includes(companyUsersModal.id)){
        updated=all.map(u=>u.id===selectedExistingUserId?{...u,company_ids:[...existing,companyUsersModal.id],company_id:u.company_id||companyUsersModal.id}:u);
      } else { updated=all; }
    } else {
      updated=all.map(u=>u.id===selectedExistingUserId?{...u,company_id:companyUsersModal.id}:u);
    }
    saveUsers(updated);
    reloadUsers();setSelectedExistingUserId('');setShowAddCoUser(false);setCompanyUserErr('');
  }
  function addUserToCompany(){
    if(!companyUserForm.name||!companyUserForm.username){setCompanyUserErr('Name and username are required.');return;}
    if(!companyUserForm.password||companyUserForm.password.length<4){setCompanyUserErr('Password must be at least 4 characters.');return;}
    const all=loadUsers();
    if(all.find(u=>u.username===companyUserForm.username)){setCompanyUserErr('Username already taken.');return;}
    saveUsers([...all,{id:uid(),name:companyUserForm.name,username:companyUserForm.username,password:companyUserForm.password,role:companyUserForm.role,email:companyUserForm.email||'',company_id:companyUsersModal.id,created_at:nowISO()}]);
    reloadUsers();
    setCompanyUserForm({name:'',username:'',password:'',role:'driver',email:''});
    setCompanyUserErr('');
    setShowAddCoUser(false);
  }
  function removeUserFromCompany(userId){
    // Unassign from company (keep user in system, clear company_id)
    const all=loadUsers();
    const target=all.find(u=>u.id===userId);
    if(!target) return;
    if(target.role==='platform_admin'){
      // Platform admin: remove this company from company_ids array; update primary company_id
      const newIds=(target.company_ids||[]).filter(id=>id!==companyUsersModal.id);
      const newPrimary=newIds.length>0?newIds[0]:'';
      saveUsers(all.map(u=>u.id===userId?{...u,company_ids:newIds,company_id:newPrimary}:u));
    } else {
      saveUsers(all.map(u=>u.id===userId?{...u,company_id:''}:u));
    }
    reloadUsers();
  }

  // Filter users by company for non-platform-admins; also hide platform_admin accounts from company views
  const visibleUsers=isPlatformAdmin
    ?users
    :users.filter(u=>u.company_id===currentUser.company_id&&u.role!=='platform_admin');
  // Add users: Platform Admin, Company Admin, Fleet Manager only
  const canManageUsers=isPlatformAdmin||(currentUser.role==='company_admin')||(currentUser.role==='fleet_manager');
  // Edit user details: Platform Admin and Company Admin ONLY
  const canEditUser=isPlatformAdmin||(currentUser.role==='company_admin');
  // Suspend / Delete users: Platform Admin and Company Admin ONLY
  const canDeleteSuspend=isPlatformAdmin||(currentUser.role==='company_admin');
  // Fleet Manager can only change roles for: driver
  const FM_CHANGEABLE_ROLES=['driver'];
  // Logistics Manager: NO user management actions at all (view only in Settings)
  const lmCanChangeRole=()=>false;
  // Can Fleet Manager change this user's role?
  const fmCanChangeRole=(u)=>currentUser.role==='fleet_manager'&&FM_CHANGEABLE_ROLES.includes(u.role);
  // Can current user change role for a specific user?
  const canChangeRole=(u)=>u.id!==currentUser.id&&(canEditUser||fmCanChangeRole(u));
  // Roles Fleet Manager is allowed to assign
  const rolesForFM=FM_CHANGEABLE_ROLES;

  const pendingUsers=users.filter(u=>u.role==='pending');
  const tabs=[['users', isPlatformAdmin?'👥 '+t('tabUsers'):'👥 '+(lang==='ar'?'أعضاء الفريق':'Team Members')]];
  if(isPlatformAdmin||(currentUser.role==='company_admin')) tabs.push(['permissions','🔐 '+(lang==='ar'?'الصلاحيات':'Roles & Permissions')]);
  // Marketplace removed — Companies and Pending tabs disabled

  // ── Permission matrix state ──────────────────────────
  const [editPerms,setEditPerms]=useState(()=>{
    const r={};
    CONFIGURABLE_ROLES.forEach(role=>{
      r[role]={};
      SETTING_MODULES.forEach(m=>{r[role][m.id]=getEffectivePerm(role,m.id);});
    });
    return r;
  });
  const [permSaved,setPermSaved]=useState(false);
  function cycleLevel(role,mod){
    setPermSaved(false);
    setEditPerms(p=>({...p,[role]:{...p[role],[mod]:PERM_LEVELS[(PERM_LEVELS.indexOf(p[role][mod])+1)%PERM_LEVELS.length]}}));
  }
  function savePerms(){
    const custom={};
    CONFIGURABLE_ROLES.forEach(role=>{
      SETTING_MODULES.forEach(m=>{
        const def=PERMS[role]?.[m.id]||'none';
        if(editPerms[role][m.id]!==def){if(!custom[role])custom[role]={};custom[role][m.id]=editPerms[role][m.id];}
      });
    });
    applyCustomPerms(custom);
    setPermSaved(true);
    setTimeout(()=>window.location.reload(),900);
  }
  function resetPerms(){
    applyCustomPerms({});
    const r={};
    CONFIGURABLE_ROLES.forEach(role=>{r[role]={};SETTING_MODULES.forEach(m=>{r[role][m.id]=PERMS[role]?.[m.id]||'none';});});
    setEditPerms(r);
    setPermSaved(false);
    setTimeout(()=>window.location.reload(),400);
  }

  return (
    <div className="p-6" style={{padding:24}}>
      <div className="ph" style={{marginBottom:22}}>
        <div className="ph-left">
          <div className="ph-icon" style={{background:'linear-gradient(135deg,#7c3aed,#5b21b6)'}}>⚙️</div>
          <div>
            <div style={{fontWeight:800,fontSize:20,color:'#0f172a'}}>{t('settings')}</div>
            <div style={{fontSize:13,color:'#64748b'}}>{lang==='ar'?'إدارة المستخدمين وحسابات الشركات':'Manage team members and company accounts'}</div>
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{display:'flex',gap:8,marginBottom:20,background:'#f8fafc',borderRadius:12,padding:4,width:'fit-content',border:'1px solid #f1f5f9'}}>
        {tabs.map(([t,l])=>(
          <button key={t} className={'tab-btn'+(tab===t?' active':'')} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

/* ═══════════════ VEHICLE DOCUMENTS VAULT ═══════════════ */
const loadVDocs=()=>{try{return JSON.parse(localStorage.getItem('sw3_vdocs')||'[]');}catch(e){return[];}};
const saveVDocs=d=>localStorage.setItem('sw3_vdocs',JSON.stringify(d));
const VDOC_TYPES=['Insurance','Registration','Vehicle License','Driver License','Food Transport Permit','Refrigeration Cert','Customs Permit','Road Tax','Technical Inspection','Other'];

function VehicleDocuments({vehicles,currentUser}){
  const lang=useLang();
  const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const [docs,setDocs]=useState(loadVDocs);
  const [addModal,setAddModal]=useState(null); // vehicle object
  const [form,setForm]=useState({type:'Insurance',number:'',expiry:'',issuer:'',notes:''});
  const [formErr,setFormErr]=useState('');
  const [filterVeh,setFilterVeh]=useState('');
  const canManage=['platform_admin','company_admin','fleet_manager','transportation_manager','logistics_manager'].includes(currentUser.role);
  const myDocs=docs.filter(d=>vehicles.some(v=>v.id===d.vehicle_id));
  const filteredDocs=filterVeh?myDocs.filter(d=>d.vehicle_id===filterVeh):myDocs;

  function docStatus(expiry){
    if(!expiry) return 'unknown';
    const dl=Math.ceil((new Date(expiry)-new Date())/(1000*60*60*24));
    if(dl<0) return 'expired';
    if(dl<=30) return 'expiring';
    return 'valid';
  }
  function statusChip(expiry){
    const s=docStatus(expiry);
    const dl=expiry?Math.ceil((new Date(expiry)-new Date())/(1000*60*60*24)):null;
    const cfg={valid:{cls:'doc-valid',label:dl!==null?dl+'d':t('active')},expiring:{cls:'doc-expiring',label:dl+'d ⚠'},expired:{cls:'doc-expired',label:lang==='ar'?'منتهي':'Expired'},unknown:{cls:'',label:'—'}};
    const c=cfg[s]||cfg.unknown;
    return <span className={'badge '+c.cls} style={{fontSize:10}}>{c.label}</span>;
  }
  function saveDoc(){
    if(!form.type){setFormErr(lang==='ar'?'نوع المستند مطلوب':'Document type is required.');return;}
    if(!form.expiry){setFormErr(lang==='ar'?'تاريخ الانتهاء مطلوب':'Expiry date is required.');return;}
    const all=loadVDocs();
    const newDoc={id:uid(),vehicle_id:addModal.id,company_id:addModal.company_id||currentUser.company_id||'',...form,created_at:nowISO()};
    saveVDocs([...all,newDoc]);
    setDocs(loadVDocs());
    setAddModal(null);
    setForm({type:'Insurance',number:'',expiry:'',issuer:'',notes:''});
    setFormErr('');
  }
  function deleteDoc(id){
    saveVDocs(loadVDocs().filter(d=>d.id!==id));
    setDocs(loadVDocs());
  }
  const expiringSoon=myDocs.filter(d=>docStatus(d.expiry)==='expiring').length;
  const expired=myDocs.filter(d=>docStatus(d.expiry)==='expired').length;
  return (
    <div className="p-6">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-icon" style={{background:'linear-gradient(135deg,#7c3aed22,#6d28d922)'}}><span>📄</span></div>
          <div>
            <h1 style={{fontSize:22,fontWeight:800,color:'#0f172a',margin:0}}>{lang==='ar'?'خزينة المستندات':'Document Vault'}</h1>
            <p style={{color:'#64748b',fontSize:13,margin:0}}>{lang==='ar'?'تأمين وتراخيص وتصاريح المركبات':'Vehicle insurance, licenses & permits'}</p>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {expiringSoon>0&&<span style={{background:'#fffbeb',color:'#d97706',border:'1px solid #fde68a',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:700}}>⚠ {expiringSoon} {lang==='ar'?'تنتهي قريباً':'Expiring soon'}</span>}
          {expired>0&&<span style={{background:'#fef2f2',color:'#dc2626',border:'1px solid #fecaca',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:700}}>🔴 {expired} {lang==='ar'?'منتهية':'Expired'}</span>}
        </div>
      </div>
      {/* Filter */}
      <div className="filter-bar" style={{marginBottom:16}}>
        <div className="fb-field">
          <label>{t('vehicles')}</label>
          <select value={filterVeh} onChange={e=>setFilterVeh(e.target.value)} style={{minWidth:180}}>
            <option value="">{lang==='ar'?'كل المركبات':'All Vehicles'}</option>
            {vehicles.map(v=><option key={v.id} value={v.id}>{v.plate||v.name} — {v.make}</option>)}
          </select>
        </div>
        {filterVeh&&<button className="filter-reset" onClick={()=>setFilterVeh('')}>✕ {t('reset')}</button>}
      </div>
      {/* Vehicles with their docs */}
      {vehicles.filter(v=>!filterVeh||v.id===filterVeh).map(v=>{
        const vDocs=filteredDocs.filter(d=>d.vehicle_id===v.id);
        return (
          <div key={v.id} className="card" style={{marginBottom:14,overflow:'hidden'}}>
            <div style={{padding:'12px 18px',borderBottom:vDocs.length?'1px solid #f1f5f9':'none',display:'flex',alignItems:'center',justifyContent:'space-between',background:'#fafbfd'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#7c3aed20,#6d28d920)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🚛</div>
                <div>
                  <div style={{fontWeight:800,fontSize:14,color:'#0f172a'}}>{v.plate||v.name}</div>
                  <div style={{fontSize:11,color:'#94a3b8'}}>{[v.make,v.model,v.year].filter(Boolean).join(' ')}</div>
                </div>
                <span style={{background:'#f1f5f9',color:'#64748b',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:600}}>{vDocs.length} {lang==='ar'?'مستندات':'docs'}</span>
              </div>
              {canManage&&<button onClick={()=>{setAddModal(v);setForm({type:'Insurance',number:'',expiry:'',issuer:'',notes:''});setFormErr('');}} className="btn btn-blue" style={{fontSize:12,padding:'6px 14px'}}>+ {t('addDocument')}</button>}
            </div>
            {vDocs.length>0&&(
              <table>
                <thead><tr>
                  <th>{t('docType')}</th>
                  <th>{t('docNumber')}</th>
                  <th>{lang==='ar'?'جهة الإصدار':'Issuer'}</th>
                  <th>{t('expiry')}</th>
                  <th>{t('daysLeft')}</th>
                  {canManage&&<th></th>}
                </tr></thead>
                <tbody>{vDocs.sort((a,b)=>(a.expiry||'').localeCompare(b.expiry||'')).map(d=>(
                  <tr key={d.id}>
                    <td style={{fontWeight:700,color:'#374155'}}>{d.type}</td>
                    <td style={{fontFamily:'monospace',color:'#2563eb'}}>{d.number||'—'}</td>
                    <td style={{color:'#64748b'}}>{d.issuer||'—'}</td>
                    <td style={{color:docStatus(d.expiry)==='expired'?'#dc2626':docStatus(d.expiry)==='expiring'?'#d97706':'#059669',fontWeight:600}}>{d.expiry||'—'}</td>
                    <td>{statusChip(d.expiry)}</td>
                    {canManage&&<td><button onClick={()=>deleteDoc(d.id)} style={{background:'#fef2f2',color:'#ef4444',border:'1px solid #fecaca',borderRadius:6,padding:'3px 8px',fontSize:11,fontWeight:700,cursor:'pointer'}}>{t('delete')}</button></td>}
                  </tr>
                ))}</tbody>
              </table>
            )}
            {vDocs.length===0&&<div style={{padding:'16px 18px',color:'#94a3b8',fontSize:13}}>{lang==='ar'?'لا توجد مستندات مضافة لهذه المركبة':'No documents added for this vehicle yet.'}</div>}
          </div>
        );
      })}
      {vehicles.length===0&&<div className="empty"><span className="ei">📄</span><div>{lang==='ar'?'أضف مركبات أولاً':'Add vehicles first to manage documents.'}</div></div>}
      {/* Add Document Modal */}
      {addModal&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setAddModal(null)}>
          <div className="modal" style={{maxWidth:480}}>
            <div style={{padding:'18px 22px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:900,fontSize:16,color:'#0f172a'}}>📄 {t('addDocument')}</div>
                <div style={{fontSize:12,color:'#2563eb',fontWeight:700,marginTop:2}}>{addModal.plate||addModal.name}</div>
              </div>
              <button onClick={()=>setAddModal(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#94a3b8'}}>✕</button>
            </div>
            <div style={{padding:'18px 22px'}}>
              {formErr&&<div className="rbox" style={{marginBottom:12,fontSize:12}}>{formErr}</div>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div style={{gridColumn:'1/-1'}}>
                  <label className="lbl">{t('docType')}</label>

                    {VDOC_TYPES.map(t2=><option key={t2}>{t2}</option>)}
                  </select>
                </div>
                <div>
                  <label className="lbl">{t('docNumber')}</label>
                  <input value={form.number} onChange={e=>setForm(f=>({...f,number:e.target.value}))} placeholder="e.g. INS-2024-8823"/>
                </div>
                <div>
                  <label className="lbl">{t('expiry')} *</label>
                  <input type="date" value={form.expiry} onChange={e=>setForm(f=>({...f,expiry:e.target.value}))}/>
                </div>
                <div style={{gridColumn:'1/-1'}}>
                  <label className="lbl">{lang==='ar'?'جهة الإصدار':'Issuer / Authority'}</label>
                  <input value={form.issuer} onChange={e=>setForm(f=>({...f,issuer:e.target.value}))} placeholder={lang==='ar'?'وزارة الداخلية، شركة التأمين…':'Ministry of Interior, Insurance Co…'}/>
                </div>
                <div style={{gridColumn:'1/-1'}}>
                  <label className="lbl">{t('notes')}</label>
                  <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} placeholder={lang==='ar'?'أي ملاحظات إضافية…':'Any additional notes…'}/>
                </div>
              </div>
            </div>
            <div style={{padding:'12px 22px',borderTop:'1px solid #f1f5f9',display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>setAddModal(null)} className="btn btn-gray">{t('cancel')}</button>
              <button onClick={saveDoc} className="btn btn-blue">💾 {t('save')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ LIVE TRACKING ═══════════════ */
const KUWAIT_BASES=[
  [29.3759,47.9774],[29.3669,47.9281],[29.2097,48.1342],[29.0856,48.0773],
  [29.3367,47.6586],[29.0855,48.1291],[29.2578,48.0699],[29.2267,47.9689],
  [29.3100,47.9200],[29.2800,48.0100],[29.1500,47.9500],[29.3500,47.8800],
];
const GPS_STATUS_COLOR={moving:'#22c55e',idle:'#f59e0b',stopped:'#ef4444',offline:'#94a3b8'};
const SENSOR_MODELS=['Teltonika FMB920','Teltonika FMT100','Ruptela FM-Eco4','Concox AT1','Queclink GV350','Calamp LMU-4200','Other'];

const loadGeofences=()=>{try{return JSON.parse(localStorage.getItem('sw3_geo')||'[]');}catch(e){return[];}};
const saveGeofences=d=>localStorage.setItem('sw3_geo',JSON.stringify(d));
const loadTrips=()=>{try{return JSON.parse(localStorage.getItem('sw3_trips')||'[]');}catch(e){return[];}};
const saveTrips=d=>localStorage.setItem('sw3_trips',JSON.stringify(d));

function LiveTracking({vehicles,currentUser}){
  const lang=useLang();
  const t=k=>T[lang]?.[k]||T['en']?.[k]||k;
  const [trackTab,setTrackTab]=useState('map'); // 'map' | 'geofences' | 'history'
  const [sensors,setSensorsState]=useState(loadSensors);
  const [gps,setGps]=useState(loadGPS);
  const [selectedVid,setSelectedVid]=useState(null);
  const [setupModal,setSetupModal]=useState(null);
  const [filterStatus,setFilterStatus]=useState('all');
  const [sensorForm,setSensorForm]=useState({imei:'',serial:'',model:'Teltonika FMB920',installer:'',installed_at:'',notes:''});
  const [geofences,setGeofences]=useState(loadGeofences);
  const [geoForm,setGeoForm]=useState({name:'',lat:'',lng:'',radius:500,color:'#3b82f6'});
  const [geoModal,setGeoModal]=useState(false);
  const [trips,setTrips]=useState(loadTrips);
  const [formErr,setFormErr]=useState('');
  const mapRef=useRef(null);
  const mapInstanceRef=useRef(null);
  const markersRef=useRef({});
  const simRef=useRef(null);

  const canManage=currentUser.role==='platform_admin';
  // sensors that belong to any vehicle in this user's scoped vehicles list
  const mySensors=sensors.filter(s=>vehicles.some(v=>v.id===s.vehicle_id));
  const activeSensors=mySensors.filter(s=>s.status==='active');

  // ── Init map ──────────────────────────────────────────
  useEffect(()=>{
    if(!mapRef.current||mapInstanceRef.current) return;
    const L=window.L;
    if(!L) return;
    const map=L.map(mapRef.current,{center:[29.3100,47.9500],zoom:10,zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom:19
    }).addTo(map);
    mapInstanceRef.current=map;
    return ()=>{ if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;} };
  },[]);

  // ── Sync markers when GPS data changes ───────────────
  useEffect(()=>{
    const map=mapInstanceRef.current;
    if(!map||!window.L) return;
    const L=window.L;
    vehicles.forEach(v=>{
      const sensor=activeSensors.find(s=>s.vehicle_id===v.id);
      const pos=gps[v.id];
      if(!sensor||!pos){
        if(markersRef.current[v.id]){map.removeLayer(markersRef.current[v.id]);delete markersRef.current[v.id];}
        return;
      }
      const color=GPS_STATUS_COLOR[pos.status]||'#94a3b8';
      const icon=L.divIcon({
        className:'',
        html:`<div style="width:36px;height:36px;background:${color};border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.35);font-size:16px;cursor:pointer;">🚛</div>`,
        iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]
      });
      const popupHtml=`<div style="min-width:200px;font-family:system-ui;padding:2px">
        <div style="font-weight:800;font-size:14px;color:#0f172a;margin-bottom:2px">${v.plate||v.name||'Vehicle'}</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:8px">${[v.make,v.model,v.year].filter(Boolean).join(' ')}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          <span style="background:${color}20;color:${color};border:1px solid ${color}50;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;text-transform:capitalize">${pos.status}</span>
          <span style="background:#f1f5f9;color:#334155;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600">${pos.speed||0} km/h</span>
          <span style="background:#f1f5f9;color:#334155;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600">${Math.round(pos.heading||0)}°</span>
        </div>
        <div style="font-size:11px;color:#94a3b8">📡 ${sensor.model||'GPS Sensor'} · IMEI: ${sensor.imei}</div>
        <div style="font-size:11px;color:#94a3b8;margin-top:2px">🕐 ${pos.last_update?new Date(pos.last_update).toLocaleTimeString():'—'}</div>
        <div style="font-size:10px;color:#b0bec5;margin-top:4px">📌 ${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}</div>
      </div>`;
      if(markersRef.current[v.id]){
        markersRef.current[v.id].setLatLng([pos.lat,pos.lng]);
        markersRef.current[v.id].setIcon(icon);
        markersRef.current[v.id].getPopup().setContent(popupHtml);
      } else {
        const marker=L.marker([pos.lat,pos.lng],{icon}).addTo(map).bindPopup(popupHtml,{maxWidth:260});
        marker.on('click',()=>setSelectedVid(v.id));
        markersRef.current[v.id]=marker;
      }
    });
    // Remove markers for vehicles no longer tracked
    Object.keys(markersRef.current).forEach(vid=>{
      if(!activeSensors.find(s=>s.vehicle_id===vid)){
        map.removeLayer(markersRef.current[vid]);
        delete markersRef.current[vid];
      }
    });
  },[gps,activeSensors.length,vehicles.length]);

  // ── GPS simulation engine ────────────────────────────
  useEffect(()=>{
    if(simRef.current) clearInterval(simRef.current);
    // Seed initial positions for new active sensors
    const currentGps=loadGPS();
    let seeded=false;
    activeSensors.forEach((s,i)=>{
      if(!currentGps[s.vehicle_id]){
        const base=KUWAIT_BASES[i%KUWAIT_BASES.length];
        const statuses=['moving','moving','moving','idle','stopped'];
        const startStatus=statuses[Math.floor(Math.random()*statuses.length)];
        currentGps[s.vehicle_id]={
          lat:base[0]+(Math.random()-.5)*.04,
          lng:base[1]+(Math.random()-.5)*.04,
          speed:startStatus==='moving'?Math.floor(Math.random()*50)+20:0,
          heading:Math.floor(Math.random()*360),
          status:startStatus,
          last_update:nowISO()
        };
        seeded=true;
      }
    });
    if(seeded){saveGPS(currentGps);setGps({...currentGps});}

    // Tick every 4 seconds
    simRef.current=setInterval(()=>{
      const g=loadGPS();
      let changed=false;
      activeSensors.forEach(s=>{
        const pos=g[s.vehicle_id];
        if(!pos) return;
        const r=Math.random();
        if(pos.status==='moving'){
          if(r<0.04){pos.status='idle';pos.speed=0;}
          else if(r<0.06){pos.status='stopped';pos.speed=0;}
          else{
            // drift in heading direction
            const headRad=(pos.heading*Math.PI)/180;
            const newSpeed=Math.max(20,Math.min(90,pos.speed+(Math.random()-.5)*12));
            const distDeg=newSpeed/111000*4;
            pos.lat+=Math.cos(headRad)*distDeg;
            pos.lng+=Math.sin(headRad)*distDeg;
            // Keep roughly in Kuwait bounding box
            pos.lat=Math.max(28.5,Math.min(30.1,pos.lat));
            pos.lng=Math.max(46.5,Math.min(48.5,pos.lng));
            pos.speed=Math.round(newSpeed);
            pos.heading=(pos.heading+(Math.random()-.5)*25+360)%360;
          }
        } else if(pos.status==='idle'){
          if(r<0.12){pos.status='moving';pos.speed=Math.floor(Math.random()*30)+15;}
          else if(r<0.15){pos.status='stopped';pos.speed=0;}
        } else if(pos.status==='stopped'){
          if(r<0.04){pos.status='idle';}
        }
        pos.last_update=nowISO();
        // ── Geofence check ──────────────────────────────
        const currentGeo=loadGeofences();
        currentGeo.forEach(geo=>{
          const dLat=pos.lat-Number(geo.lat); const dLng=pos.lng-Number(geo.lng);
          const dist=Math.sqrt(dLat*dLat+dLng*dLng)*111000; // rough meters
          const wasInside=geo.vehicles_inside&&geo.vehicles_inside[s.vehicle_id];
          const isInside=dist<=Number(geo.radius||500);
          if(isInside!==wasInside){
            if(!geo.vehicles_inside) geo.vehicles_inside={};
            geo.vehicles_inside[s.vehicle_id]=isInside;
            // Log trip event
            const allTrips=loadTrips();
            const veh=vehicles.find(v=>v.id===s.vehicle_id);
            allTrips.unshift({id:uid(),vehicle_id:s.vehicle_id,vehicle_name:veh?.plate||veh?.name||s.vehicle_id,geofence_id:geo.id,geofence_name:geo.name,event:isInside?'entered':'exited',lat:pos.lat,lng:pos.lng,timestamp:nowISO()});
            saveTrips(allTrips.slice(0,200));
            setTrips(allTrips.slice(0,200));
          }
        });
        saveGeofences(currentGeo);
        g[s.vehicle_id]=pos;
        changed=true;
      });
      if(changed){saveGPS(g);setGps({...g});}
    },4000);
    return ()=>{ if(simRef.current) clearInterval(simRef.current); };
  },[activeSensors.map(s=>s.id).join(','),vehicles.length]);

    const sensor={
      id:existing?.id||uid(),
      vehicle_id:setupModal.id,
      company_id:setupModal.company_id||currentUser.company_id||'',
      imei:sensorForm.imei.trim(),serial:sensorForm.serial.trim(),
      model:sensorForm.model,installer:sensorForm.installer.trim(),
      installed_at:sensorForm.installed_at||todayStr(),
      notes:sensorForm.notes.trim(),status:'active',created_at:existing?.created_at||nowISO()
    };
    const updated=existing?all.map(s=>s.id===existing.id?sensor:s):[...all,sensor];
    saveSensors(updated);
    setSensorsState(loadSensors());
    setSetupModal(null);
  }
  function removeSensor(vid){
    saveSensors(loadSensors().filter(s=>s.vehicle_id!==vid));
